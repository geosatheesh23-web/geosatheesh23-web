<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 Extracted</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#faf8ef;
}

#game-container{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
}

.grid-wrapper{
    width:340px;
    height:340px;
    background:#bbada0;
    position:relative;
    border-radius:6px;
    touch-action:none;
    user-select:none;
}

.grid-container{
    position:relative;
    width:100%;
    height:100%;
}

.grid-background{
    position:absolute;
    width:70px;
    height:70px;
    background:#d4d0c8;
    border-radius:3px;
}

.cell{
    position:absolute;
    width:70px;
    height:70px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    font-size:35px;
    border-radius:3px;
    transition:0.15s;
}

.cell[data-value="2"]{background:#eee4da;}
.cell[data-value="4"]{background:#ede0c8;}
.cell[data-value="8"]{background:#f2b179;color:#fff;}
.cell[data-value="16"]{background:#f59563;color:#fff;}
.cell[data-value="32"]{background:#f67c5f;color:#fff;}
.cell[data-value="64"]{background:#f65e3b;color:#fff;}
.cell[data-value="128"]{background:#edcf72;color:#fff;font-size:30px;}
.cell[data-value="256"]{background:#edcc61;color:#fff;font-size:30px;}
.cell[data-value="512"]{background:#edc850;color:#fff;font-size:30px;}
.cell[data-value="1024"]{background:#edc53f;color:#fff;font-size:25px;}
.cell[data-value="2048"]{background:#edc22e;color:#fff;font-size:25px;}

button{
    padding:10px 20px;
    background:#8f7a66;
    color:#fff;
    border:none;
    border-radius:4px;
    cursor:pointer;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div id="game-container">

<button onclick="window.location.href='../index.html'">Home</button>
<button onclick="newGame()">Restart</button>

<div class="grid-wrapper">
    <div class="grid-container" id="grid"></div>
</div>

</div>

<script>
let board=[];
const SIZE=4;
let score=0;

const grid=document.getElementById("grid");

function newGame(){
    board=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
    score=0;
    spawn(); spawn();
    draw(); render();
}

function spawn(){
    let empty=[];
    for(let i=0;i<SIZE;i++)
    for(let j=0;j<SIZE;j++)
        if(board[i][j]===0) empty.push({i,j});

    if(!empty.length) return;

    let p=empty[Math.floor(Math.random()*empty.length)];
    board[p.i][p.j]=Math.random()<0.9?2:4;
}

function draw(){
    grid.innerHTML="";
    for(let i=0;i<SIZE;i++)
    for(let j=0;j<SIZE;j++){
        let bg=document.createElement("div");
        bg.className="grid-background";
        bg.style.left=j*80+"px";
        bg.style.top=i*80+"px";
        grid.appendChild(bg);
    }
}

function render(){
    document.querySelectorAll(".cell").forEach(e=>e.remove());

    for(let i=0;i<SIZE;i++)
    for(let j=0;j<SIZE;j++){
        let v=board[i][j];
        if(!v) continue;

        let cell=document.createElement("div");
        cell.className="cell";
        cell.dataset.value=v;
        cell.textContent=v;
        cell.style.left=j*80+"px";
        cell.style.top=i*80+"px";
        grid.appendChild(cell);
    }
}

function slide(line){
    line=line.filter(v=>v);

    for(let i=0;i<line.length-1;i++){
        if(line[i]===line[i+1]){
            line[i]*=2;
            line.splice(i+1,1);
        }
    }

    while(line.length<SIZE) line.push(0);
    return line;
}

function move(dir){
    let newB=JSON.parse(JSON.stringify(board));

    if(dir==="left"){
        for(let i=0;i<SIZE;i++)
            newB[i]=slide(newB[i]);
    }

    if(dir==="right"){
        for(let i=0;i<SIZE;i++)
            newB[i]=slide(newB[i].reverse()).reverse();
    }

    if(dir==="up"){
        for(let j=0;j<SIZE;j++){
            let col=[];
            for(let i=0;i<SIZE;i++) col.push(newB[i][j]);
            col=slide(col);
            for(let i=0;i<SIZE;i++) newB[i][j]=col[i];
        }
    }

    if(dir==="down"){
        for(let j=0;j<SIZE;j++){
            let col=[];
            for(let i=0;i<SIZE;i++) col.push(newB[i][j]);
            col=slide(col.reverse()).reverse();
            for(let i=0;i<SIZE;i++) newB[i][j]=col[i];
        }
    }

    board=newB;
    spawn();
    render();
}

document.addEventListener("keydown",e=>{
    if(e.key==="ArrowLeft") move("left");
    if(e.key==="ArrowRight") move("right");
    if(e.key==="ArrowUp") move("up");
    if(e.key==="ArrowDown") move("down");
});

let sx=0,sy=0;

grid.addEventListener("pointerdown",e=>{
    sx=e.clientX;
    sy=e.clientY;
});

grid.addEventListener("pointerup",e=>{
    let dx=e.clientX-sx;
    let dy=e.clientY-sy;

    if(Math.abs(dx)>Math.abs(dy)){
        move(dx>0?"right":"left");
    }else{
        move(dy>0?"down":"up");
    }
});

newGame();
</script>

</body>
</html>
