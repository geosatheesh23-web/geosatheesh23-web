<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 Premium</title>

<style>
*{
    box-sizing:border-box;
    user-select:none;
    -webkit-user-select:none;
}

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#faf8ef,#e6ded2);
    text-align:center;
}

/* TOP */
.topbar{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    padding:15px;
}

.score{
    background:#bbada0;
    color:#fff;
    padding:10px 15px;
    border-radius:8px;
    font-weight:bold;
}

button{
    background:#8f7a66;
    color:#fff;
    border:none;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
}

/* GRID */
.grid{
    width:340px;
    height:340px;
    margin:auto;
    background:#bbada0;
    border-radius:12px;
    position:relative;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
    touch-action:none;
}

.bg{
    position:absolute;
    width:70px;
    height:70px;
    background:#d6d0c4;
    border-radius:8px;
}

/* TILE */
.tile{
    position:absolute;
    width:70px;
    height:70px;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:26px;
    transition:all .16s ease;
    pointer-events:none; /* 🔥 FIX */
}

/* SPAWN */
.spawn{
    animation:pop .18s ease;
}

@keyframes pop{
    0%{transform:scale(.5);}
    60%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

/* MERGE + COMBO GLOW */
.merge{
    animation:merge .2s ease;
}

@keyframes merge{
    0%{transform:scale(1);}
    50%{transform:scale(1.25);}
    100%{transform:scale(1);}
}

.glow{
    box-shadow:0 0 15px rgba(255,200,0,0.7);
}

/* COLORS */
.tile[data-v="2"]{background:#eee4da;}
.tile[data-v="4"]{background:#ede0c8;}
.tile[data-v="8"]{background:#f2b179;color:#fff;}
.tile[data-v="16"]{background:#f59563;color:#fff;}
.tile[data-v="32"]{background:#f67c5f;color:#fff;}
.tile[data-v="64"]{background:#f65e3b;color:#fff;}
.tile[data-v="128"]{background:#edcf72;color:#fff;}
.tile[data-v="256"]{background:#edcc61;color:#fff;}
.tile[data-v="512"]{background:#edc850;color:#fff;}
.tile[data-v="1024"]{background:#edc53f;color:#fff;}
.tile[data-v="2048"]{background:#edc22e;color:#fff;}

/* OVERLAY */
.overlay{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.6);
}

.popup{
    background:#fff;
    padding:30px;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="topbar">
    <button onclick="window.location.href='../index.html'">🏠 Home</button>
    <button onclick="newGame()">Restart</button>
    <div class="score">Score: <span id="score">0</span></div>
    <div class="score">Best: <span id="best">0</span></div>
</div>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
    <div class="popup">
        <h2 id="msg"></h2>
        <p id="final"></p>
        <button onclick="newGame()">Play Again</button>
    </div>
</div>

<script>
let board=[];
let SIZE=4;
let score=0;
let best=localStorage.getItem("best2048")||0;
let lock=false;
let won=false;

const grid=document.getElementById("grid");

/* INIT */
function newGame(){
    board=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
    score=0;
    won=false;
    lock=false;
    overlay.style.display="none";
    spawn(); spawn();
    drawBG();
    render();
    updateUI();
}

/* SPAWN */
function spawn(){
    let empty=[];
    for(let i=0;i<SIZE;i++)
    for(let j=0;j<SIZE;j++)
        if(!board[i][j]) empty.push({i,j});

    if(!empty.length) return;

    let p=empty[Math.floor(Math.random()*empty.length)];
    board[p.i][p.j]=Math.random()<0.9?2:4;
}

/* BG */
function drawBG(){
    grid.innerHTML="";
    for(let i=0;i<SIZE;i++)
    for(let j=0;j<SIZE;j++){
        let bg=document.createElement("div");
        bg.className="bg";
        bg.style.left=j*80+"px";
        bg.style.top=i*80+"px";
        grid.appendChild(bg);
    }
}

/* RENDER */
function render(comboLevel=0){
    document.querySelectorAll(".tile").forEach(e=>e.remove());

    for(let i=0;i<SIZE;i++)
    for(let j=0;j<SIZE;j++){
        let v=board[i][j];
        if(!v) continue;

        let t=document.createElement("div");
        t.className="tile spawn";
        t.dataset.v=v;
        t.textContent=v;

        if(comboLevel>=2){
            t.classList.add("glow");
        }

        t.style.left=j*80+"px";
        t.style.top=i*80+"px";

        grid.appendChild(t);
    }
}

/* SLIDE */
function slide(row){
    row=row.filter(v=>v);
    let combo=0;

    for(let i=0;i<row.length-1;i++){
        if(row[i]===row[i+1]){
            row[i]*=2;
            score+=row[i];
            combo++;

            if(row[i]===2048 && !won){
                won=true;
                show("You Win!");
            }

            row.splice(i+1,1);
        }
    }

    while(row.length<SIZE) row.push(0);
    return {row,combo};
}

/* MOVE */
function move(dir){
    if(lock) return;

    let old=JSON.stringify(board);
    let newB=JSON.parse(JSON.stringify(board));
    let comboTotal=0;

    if(dir==="left"){
        for(let i=0;i<SIZE;i++){
            let r=slide(newB[i]);
            newB[i]=r.row;
            comboTotal+=r.combo;
        }
    }

    if(dir==="right"){
        for(let i=0;i<SIZE;i++){
            let r=slide([...newB[i]].reverse());
            newB[i]=r.row.reverse();
            comboTotal+=r.combo;
        }
    }

    if(dir==="up"){
        for(let j=0;j<SIZE;j++){
            let col=[];
            for(let i=0;i<SIZE;i++) col.push(newB[i][j]);
            let r=slide(col);
            for(let i=0;i<SIZE;i++) newB[i][j]=r.row[i];
            comboTotal+=r.combo;
        }
    }

    if(dir==="down"){
        for(let j=0;j<SIZE;j++){
            let col=[];
            for(let i=0;i<SIZE;i++) col.push(newB[i][j]);
            let r=slide(col.reverse());
            r.row.reverse();
            for(let i=0;i<SIZE;i++) newB[i][j]=r.row[i];
            comboTotal+=r.combo;
        }
    }

    if(old===JSON.stringify(newB)) return;

    lock=true;

    board=newB;
    spawn();
    render(comboTotal);
    updateUI();

    setTimeout(()=>lock=false,160);

    if(isGameOver()) show("Game Over");
}

/* GAME OVER */
function isGameOver(){
    for(let i=0;i<SIZE;i++)
    for(let j=0;j<SIZE;j++){
        if(board[i][j]===0) return false;
        if(j<3 && board[i][j]===board[i][j+1]) return false;
        if(i<3 && board[i][j]===board[i+1][j]) return false;
    }
    return true;
}

/* UI */
function updateUI(){
    document.getElementById("score").textContent=score;
    if(score>best){
        best=score;
        localStorage.setItem("best2048",best);
    }
    document.getElementById("best").textContent=best;
}

function show(text){
    overlay.style.display="flex";
    document.getElementById("msg").textContent=text;
    document.getElementById("final").textContent="Score: "+score;
}

/* PERFECT INPUT FIX */
let sx=0,sy=0;
const THRESHOLD=35;

grid.addEventListener("pointerdown",e=>{
    grid.setPointerCapture(e.pointerId);
    sx=e.clientX;
    sy=e.clientY;
});

grid.addEventListener("pointerup",e=>{
    let dx=e.clientX-sx;
    let dy=e.clientY-sy;

    if(Math.max(Math.abs(dx),Math.abs(dy))<THRESHOLD) return;

    if(Math.abs(dx)>Math.abs(dy)){
        move(dx>0?"right":"left");
    }else{
        move(dy>0?"down":"up");
    }
});

/* KEYS */
document.addEventListener("keydown",e=>{
    if(e.key==="ArrowLeft") move("left");
    if(e.key==="ArrowRight") move("right");
    if(e.key==="ArrowUp") move("up");
    if(e.key==="ArrowDown") move("down");
});

newGame();
</script>

</body>
</html>
