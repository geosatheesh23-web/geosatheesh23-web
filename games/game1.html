<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 - GameHub</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#f5f3ee,#e8e3d9);
  transition:0.4s;
  user-select:none;
  opacity:0;
}
body.loaded{opacity:1}

/* DARK */
.dark{
  background:linear-gradient(135deg,#1a1a1a,#111);
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#222;
  color:white;
}

nav a{
  color:white;
  margin:0 10px;
  text-decoration:none;
  font-weight:bold;
}
nav a:hover{color:#f2b179}

/* DROPDOWN */
.dropdown{position:relative;display:inline-block}
.dropdown-content{
  display:none;
  position:absolute;
  background:#333;
  padding:10px;
}
.dropdown:hover .dropdown-content{display:block}

/* GAME */
#game-container{
  text-align:center;
  margin-top:30px;
}

.grid-wrapper{
  margin:auto;
  margin-top:20px;
  width:360px;
  height:360px;
  padding:10px;
  background:#bbada0;
  border-radius:10px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  position:relative;
  cursor:grab;
  touch-action:none;
}
.grid-wrapper:active{cursor:grabbing}

.cell, .bg{
  position:absolute;
  width:80px;height:80px;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.bg{background:#d6cdc4}

.cell{
  font-size:28px;
  transition:0.2s;
}
.cell:hover{transform:scale(1.05)}

.cell[data-value="2"]{background:#eee4da}
.cell[data-value="4"]{background:#ede0c8}
.cell[data-value="8"]{background:#f2b179;color:white}
.cell[data-value="16"]{background:#f59563;color:white}
.cell[data-value="32"]{background:#f67c5f;color:white}
.cell[data-value="64"]{background:#f65e3b;color:white}
.cell[data-value="128"]{background:#edcf72;color:white}
.cell[data-value="256"]{background:#edcc61;color:white}
.cell[data-value="512"]{background:#edc850;color:white}
.cell[data-value="1024"]{background:#edc53f;color:white}
.cell[data-value="2048"]{background:#edc22e;color:white}

/* SCORE */
.score-box{
  display:inline-block;
  background:#bbada0;
  padding:10px 20px;
  margin:10px;
  border-radius:6px;
  color:white;
}

/* BUTTON */
button{
  padding:10px 20px;
  margin-top:15px;
  border:none;
  background:#8f7a66;
  color:white;
  cursor:pointer;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup{
  background:white;
  padding:40px;
  border-radius:10px;
  text-align:center;
}

/* PAGINATION */
.pagination{
  margin-top:30px;
}
.pagination a{
  padding:8px 12px;
  margin:3px;
  background:#333;
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <div>🎮 GameHub</div>

  <nav>
    <a href="../index.html">Home</a>
    <a href="../more.html">More</a>

    <div class="dropdown">
      <a href="#">Games ▼</a>
      <div class="dropdown-content">
        <a href="game1.html">2048</a><br>
        <a href="game2.html">Tic Tac Toe</a><br>
        <a href="game3.html">Game3</a><br>
        <a href="game4.html">Game4</a><br>
        <a href="game5.html">Game5</a>
      </div>
    </div>
  </nav>

  <button onclick="toggleTheme()">🌙</button>
</header>

<div id="game-container">
  <h1>2048</h1>

  <div>
    <div class="score-box">Score<br><span id="score">0</span></div>
    <div class="score-box">Best<br><span id="best">0</span></div>
  </div>

  <div class="grid-wrapper">
    <div id="grid"></div>
  </div>

  <button onclick="newGame()">New Game</button>
</div>

<div class="overlay" id="overlay">
  <div class="popup">
    <h2 id="resultTitle"></h2>
    <p id="finalScore"></p>
    <button onclick="newGame()">Play Again</button>
  </div>
</div>

<div class="pagination">
  <a href="game1.html">1</a>
  <a href="game2.html">2</a>
  <a href="game3.html">3</a>
  <a href="game4.html">4</a>
  <a href="game5.html">5</a>
</div>

<script>
let board=[],score=0;
let best=localStorage.getItem("best2048")||0;
const SIZE=4;
let gameOver=false,won=false;

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("dark");
}

/* LOAD */
window.onload=()=>document.body.classList.add("loaded");

/* INIT */
function newGame(){
  board=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  score=0; gameOver=false; won=false;
  document.getElementById("overlay").style.display="none";
  add(); add(); draw();
}

/* ADD TILE */
function add(){
  let empty=[];
  for(let i=0;i<SIZE;i++)
    for(let j=0;j<SIZE;j++)
      if(board[i][j]==0) empty.push({i,j});
  if(empty.length){
    let t=empty[Math.floor(Math.random()*empty.length)];
    board[t.i][t.j]=Math.random()<0.9?2:4;
  }
}

/* DRAW */
function draw(){
  const g=document.getElementById("grid");
  g.innerHTML='';
  for(let i=0;i<SIZE;i++){
    for(let j=0;j<SIZE;j++){
      let bg=document.createElement("div");
      bg.className="bg";
      bg.style.left=j*85+"px";
      bg.style.top=i*85+"px";
      g.appendChild(bg);

      if(board[i][j]){
        let c=document.createElement("div");
        c.className="cell";
        c.setAttribute("data-value",board[i][j]);
        c.textContent=board[i][j];
        c.style.left=j*85+"px";
        c.style.top=i*85+"px";
        g.appendChild(c);
      }
    }
  }
  scoreEl.textContent=score;
  bestEl.textContent=best;
}

/* MOVE */
function slide(line){
  line=line.filter(v=>v);
  for(let i=0;i<line.length-1;i++){
    if(line[i]==line[i+1]){
      line[i]*=2;
      score+=line[i];
      if(line[i]==2048) won=true;
      line.splice(i+1,1);
    }
  }
  while(line.length<SIZE) line.push(0);
  return line;
}

function move(dir){
  if(gameOver) return;
  let moved=false;
  let newB=JSON.parse(JSON.stringify(board));

  if(dir=="left"){
    for(let i=0;i<SIZE;i++){
      let r=slide(newB[i]);
      if(JSON.stringify(r)!=JSON.stringify(newB[i])) moved=true;
      newB[i]=r;
    }
  }

  if(dir=="right"){
    for(let i=0;i<SIZE;i++){
      let r=slide(newB[i].reverse()).reverse();
      if(JSON.stringify(r)!=JSON.stringify(board[i])) moved=true;
      newB[i]=r;
    }
  }

  if(dir=="up"){
    for(let j=0;j<SIZE;j++){
      let col=[];
      for(let i=0;i<SIZE;i++) col.push(newB[i][j]);
      col=slide(col);
      for(let i=0;i<SIZE;i++){
        if(newB[i][j]!=col[i]) moved=true;
        newB[i][j]=col[i];
      }
    }
  }

  if(dir=="down"){
    for(let j=0;j<SIZE;j++){
      let col=[];
      for(let i=0;i<SIZE;i++) col.push(newB[i][j]);
      col=slide(col.reverse()).reverse();
      for(let i=0;i<SIZE;i++){
        if(newB[i][j]!=col[i]) moved=true;
        newB[i][j]=col[i];
      }
    }
  }

  if(moved){
    board=newB;
    add();
    draw();

    if(check()){
      gameOver=true;
      show("Game Over");
    }
    if(won){
      show("You Won!");
    }

    if(score>best){
      best=score;
      localStorage.setItem("best2048",best);
    }
  }
}

/* CHECK */
function check(){
  for(let i=0;i<SIZE;i++){
    for(let j=0;j<SIZE;j++){
      if(board[i][j]==0) return false;
      if(j<3&&board[i][j]==board[i][j+1]) return false;
      if(i<3&&board[i][j]==board[i+1][j]) return false;
    }
  }
  return true;
}

/* SHOW */
function show(text){
  document.getElementById("overlay").style.display="flex";
  document.getElementById("resultTitle").textContent=text;
  document.getElementById("finalScore").textContent="Score: "+score;
}

/* INPUTS */
document.addEventListener("keydown",e=>{
  if(e.key=="ArrowLeft")move("left");
  if(e.key=="ArrowRight")move("right");
  if(e.key=="ArrowUp")move("up");
  if(e.key=="ArrowDown")move("down");
});

/* TOUCH */
let sx,sy;
const w=document.querySelector(".grid-wrapper");

w.addEventListener("touchstart",e=>{
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
});

w.addEventListener("touchend",e=>{
  let dx=sx-e.changedTouches[0].clientX;
  let dy=sy-e.changedTouches[0].clientY;

  if(Math.abs(dx)>Math.abs(dy)){
    move(dx>0?"left":"right");
  }else{
    move(dy>0?"up":"down");
  }
});

/* MOUSE */
let drag=false,mx,my;

w.addEventListener("mousedown",e=>{
  drag=true; mx=e.clientX; my=e.clientY;
});
document.addEventListener("mouseup",()=>drag=false);
document.addEventListener("mousemove",e=>{
  if(!drag)return;
  let dx=e.clientX-mx,dy=e.clientY-my;
  if(Math.abs(dx)>40||Math.abs(dy)>40){
    if(Math.abs(dx)>Math.abs(dy)){
      move(dx>0?"right":"left");
    }else{
      move(dy>0?"down":"up");
    }
    drag=false;
  }
});

const scoreEl=document.getElementById("score");
const bestEl=document.getElementById("best");

newGame();
</script>

</body>
</html>
