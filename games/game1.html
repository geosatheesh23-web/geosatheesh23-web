<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>

<link rel="stylesheet" href="../assets/css/style.css">

<style>
* { box-sizing: border-box; }
.grid-wrapper,
.cell {
  user-select: none;
  -webkit-user-select: none;
  -ms-user-select: none;
}
body {
  user-select: none;
}
body {
  font-family: "Helvetica Neue", Arial, sans-serif;
  background: #faf8ef;
}

/* CONTAINER */
#game-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 20px auto;
  max-width: 500px;
}

/* HEADER */
.game-header {
  width: 100%;
  display: flex;
  justify-content: space-between;
  margin-bottom: 25px;
}

.game-title h1 {
  font-size: 64px;
  color: #776e65;
  margin: 0;
}

.game-title p {
  margin: 5px 0;
  color: #9f8772;
}

/* SCORE */
.score-container {
  display: flex;
  gap: 10px;
}

.score-box {
  background: #bbada0;
  padding: 12px 20px;
  border-radius: 3px;
  text-align: center;
}

.score-label {
  font-size: 12px;
  color: #eee4da;
}

.score-value {
  font-size: 28px;
  color: #fff;
  font-weight: bold;
}

/* GRID */
.grid-wrapper {
  background: #bbada0;
  border-radius: 6px;
  padding: 10px;
  width: 340px;
  height: 340px;
  position: relative;
  cursor: grab;
}

.grid-wrapper:active { cursor: grabbing; }

.grid-container {
  position: relative;
  width: 100%;
  height: 100%;

  background-image:
    linear-gradient(90deg, transparent 70px, #a89f95 70px, #a89f95 80px, transparent 80px),
    linear-gradient(90deg, transparent 150px, #a89f95 150px, #a89f95 160px, transparent 160px),
    linear-gradient(90deg, transparent 230px, #a89f95 230px, #a89f95 240px, transparent 240px),
    linear-gradient(0deg, transparent 70px, #a89f95 70px, #a89f95 80px, transparent 80px),
    linear-gradient(0deg, transparent 150px, #a89f95 150px, #a89f95 160px, transparent 160px),
    linear-gradient(0deg, transparent 230px, #a89f95 230px, #a89f95 240px, transparent 240px);
}

.grid-background {
  position: absolute;
  width: 70px;
  height: 70px;
  background: #d4d0c8;
  border-radius: 3px;
}

.cell {
  position: absolute;
  width: 70px;
  height: 70px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 32px;
  font-weight: bold;
  border-radius: 3px;
  transition: all 0.15s ease-in-out;
}

/* COLORS */
.cell[data-value="2"] { background:#eee4da; }
.cell[data-value="4"] { background:#ede0c8; }
.cell[data-value="8"] { background:#f2b179; color:white; }
.cell[data-value="16"] { background:#f59563; color:white; }
.cell[data-value="32"] { background:#f67c5f; color:white; }
.cell[data-value="64"] { background:#f65e3b; color:white; }
.cell[data-value="128"] { background:#edcf72; }
.cell[data-value="256"] { background:#edcc61; }
.cell[data-value="512"] { background:#edc850; }
.cell[data-value="1024"] { background:#edc53f; }
.cell[data-value="2048"] { background:#edc22e; }

/* BUTTON */
.game-btn {
  margin-top: 15px;
  padding: 12px 30px;
  background: #8f7a66;
  color: white;
  border: none;
  cursor: pointer;
}

/* OVERLAY */
.game-over-overlay {
  position: fixed;
  top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content:center;
  align-items:center;
}

.game-over-content {
  background:#eee4da;
  padding:40px;
  text-align:center;
}
</style>
</head>

<body>

<div id="game-container">

<div class="game-header">
  <div class="game-title">
    <h1>2048</h1>
    <p>Join tiles to reach 2048!</p>
  </div>

  <div class="score-container">
    <div class="score-box">
      <div class="score-label">Score</div>
      <div class="score-value" id="score">0</div>
    </div>
    <div class="score-box">
      <div class="score-label">Best</div>
      <div class="score-value" id="best">0</div>
    </div>
  </div>
</div>

<div class="grid-wrapper">
  <div class="grid-container" id="grid"></div>
</div>

<button class="game-btn" onclick="newGame()">New Game</button>

</div>

<div class="game-over-overlay" id="gameOverOverlay">
  <div class="game-over-content">
    <h2 id="gameOverTitle">Game Over</h2>
    <p>Score: <span id="finalScore"></span></p>
    <p>Best: <span id="finalBest"></span></p>
    <button onclick="newGame()">Try Again</button>
  </div>
</div>

<script>
let board=[],score=0;
let best=localStorage.getItem('best2048')||0;
const SIZE=4;
let gameOver=false;

/* INIT */
function newGame(){
  board=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  score=0; gameOver=false;
  document.getElementById("gameOverOverlay").style.display="none";
  addTile(); addTile();
  draw();
}

/* TILE */
function addTile(){
  let empty=[];
  for(let i=0;i<SIZE;i++)
    for(let j=0;j<SIZE;j++)
      if(board[i][j]==0) empty.push({i,j});

  if(empty.length){
    let t=empty[Math.floor(Math.random()*empty.length)];
    board[t.i][t.j]=Math.random()<0.9?2:4;
  }
}

/* DRAW */
function draw(){
  const grid=document.getElementById("grid");
  grid.innerHTML='';

  for(let i=0;i<SIZE;i++){
    for(let j=0;j<SIZE;j++){

      let bg=document.createElement("div");
      bg.className="grid-background";
      bg.style.left=j*80+'px';
      bg.style.top=i*80+'px';
      grid.appendChild(bg);

      if(board[i][j]){
        let c=document.createElement("div");
        c.className="cell";
        c.setAttribute("data-value",board[i][j]);
        c.textContent=board[i][j];
        c.style.left=j*80+'px';
        c.style.top=i*80+'px';
        grid.appendChild(c);
      }
    }
  }

  document.getElementById("score").textContent=score;
  document.getElementById("best").textContent=best;
}

/* MOVE */
function slide(line){
  line=line.filter(v=>v);
  for(let i=0;i<line.length-1;i++){
    if(line[i]==line[i+1]){
      line[i]*=2;
      score+=line[i];
      line.splice(i+1,1);
    }
  }
  while(line.length<SIZE) line.push(0);
  return line;
}

function move(dir){
  if(gameOver) return;
  let moved=false;
  let newBoard=JSON.parse(JSON.stringify(board));

  if(dir==='left'){
    for(let i=0;i<SIZE;i++){
      let r=slide(newBoard[i]);
      if(JSON.stringify(r)!==JSON.stringify(newBoard[i])) moved=true;
      newBoard[i]=r;
    }
  }

  if(dir==='right'){
    for(let i=0;i<SIZE;i++){
      let r=slide(newBoard[i].reverse()).reverse();
      if(JSON.stringify(r)!==JSON.stringify(board[i])) moved=true;
      newBoard[i]=r;
    }
  }

  if(dir==='up'){
    for(let j=0;j<SIZE;j++){
      let col=[];
      for(let i=0;i<SIZE;i++) col.push(newBoard[i][j]);
      col=slide(col);
      for(let i=0;i<SIZE;i++){
        if(newBoard[i][j]!=col[i]) moved=true;
        newBoard[i][j]=col[i];
      }
    }
  }

  if(dir==='down'){
    for(let j=0;j<SIZE;j++){
      let col=[];
      for(let i=0;i<SIZE;i++) col.push(newBoard[i][j]);
      col=slide(col.reverse()).reverse();
      for(let i=0;i<SIZE;i++){
        if(newBoard[i][j]!=col[i]) moved=true;
        newBoard[i][j]=col[i];
      }
    }
  }

  if(moved){
    board=newBoard;
    addTile();
    draw();

    if(checkGameOver()){
      gameOver=true;
      if(score>best){
        best=score;
        localStorage.setItem("best2048",best);
      }
      showGameOver();
    }
  }
}

/* GAME OVER */
function checkGameOver(){
  for(let i=0;i<SIZE;i++){
    for(let j=0;j<SIZE;j++){
      if(board[i][j]==0) return false;
      if(j<3&&board[i][j]==board[i][j+1]) return false;
      if(i<3&&board[i][j]==board[i+1][j]) return false;
    }
  }
  return true;
}

function showGameOver(){
  document.getElementById("gameOverOverlay").style.display="flex";
  document.getElementById("finalScore").textContent=score;
  document.getElementById("finalBest").textContent=best;
}

/* INPUTS */
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") move("left");
  if(e.key==="ArrowRight") move("right");
  if(e.key==="ArrowUp") move("up");
  if(e.key==="ArrowDown") move("down");
});

/* TOUCH */
let sx,sy;
const gridWrapper=document.querySelector(".grid-wrapper");

gridWrapper.addEventListener("touchstart",e=>{
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
});

gridWrapper.addEventListener("touchend",e=>{
  let dx=sx-e.changedTouches[0].clientX;
  let dy=sy-e.changedTouches[0].clientY;

  if(Math.abs(dx)>Math.abs(dy)){
    move(dx>0?'left':'right');
  }else{
    move(dy>0?'up':'down');
  }
});

/* FIXED MOUSE */
let dragging=false,mx,my;

gridWrapper.addEventListener("mousedown",e=>{
  dragging=true;
  mx=e.clientX; my=e.clientY;
});

document.addEventListener("mouseup",()=>dragging=false);

document.addEventListener("mousemove",e=>{
  if(!dragging) return;

  let dx=e.clientX-mx;
  let dy=e.clientY-my;

  if(Math.abs(dx)<40&&Math.abs(dy)<40) return;

  if(Math.abs(dx)>Math.abs(dy)){
    move(dx>0?'right':'left');
  }else{
    move(dy>0?'down':'up');
  }

  dragging=false;
});

newGame();
</script>

</body>
</html>
