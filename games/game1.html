<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background: #faf8ef;
  margin: 0;
  opacity: 0;
  transition: opacity 0.4s ease;
  user-select: none;
}
body.loaded { opacity: 1; }

/* HEADER */
.main-header {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: #222;
  color: white;
}

.main-header nav a {
  color: white;
  margin-left: 15px;
  text-decoration: none;
}

.main-header nav a:hover {
  color: orange;
}

/* DARK MODE */
.dark { background:#121212; color:white; }

/* GAME */
#game-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 20px;
}

.game-header {
  width: 340px;
  display: flex;
  justify-content: space-between;
}

.grid-wrapper {
  background: #bbada0;
  padding: 10px;
  width: 340px;
  height: 340px;
  position: relative;
  cursor: grab;
  touch-action: none;
}

.grid-wrapper:active { cursor: grabbing; }

.grid-background {
  position: absolute;
  width: 70px;
  height: 70px;
  background: #d4d0c8;
}

.cell {
  position: absolute;
  width: 70px;
  height: 70px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.cell[data-value="2"] { background:#eee4da; }
.cell[data-value="4"] { background:#ede0c8; }
.cell[data-value="8"] { background:#f2b179; color:white; }
.cell[data-value="16"] { background:#f59563; color:white; }
.cell[data-value="32"] { background:#f67c5f; color:white; }
.cell[data-value="64"] { background:#f65e3b; color:white; }

button { margin-top:10px; padding:10px; }

/* OVERLAY */
.game-over-overlay {
  position: fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<header class="main-header">
  <div>🎮 GameHub</div>
  <nav>
    <a href="../index.html">Home</a>
    <a href="../more.html">More</a>
    <a href="game1.html">Game1</a>
    <a href="game2.html">Game2</a>
    <a href="game3.html">Game3</a>
    <a href="game4.html">Game4</a>
    <a href="game5.html">Game5</a>
  </nav>
  <button onclick="toggleTheme()">🌙</button>
</header>

<div id="game-container">

<div class="game-header">
  <h2>2048</h2>
  <div>
    Score: <span id="score">0</span><br>
    Best: <span id="best">0</span>
  </div>
</div>

<div class="grid-wrapper">
  <div id="grid"></div>
</div>

<button onclick="newGame()">New Game</button>

</div>

<div class="game-over-overlay" id="gameOverOverlay">
  <div style="background:white;padding:20px;text-align:center;">
    <h2>Game Over</h2>
    <p id="finalScore"></p>
    <button onclick="newGame()">Restart</button>
  </div>
</div>

<script>
let board=[],score=0;
let best=localStorage.getItem('best2048')||0;
const SIZE=4;
let gameOver=false;

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("dark");
}

/* PAGE LOAD */
window.onload=()=>document.body.classList.add("loaded");

/* GAME INIT */
function newGame(){
  board=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  score=0; gameOver=false;
  document.getElementById("gameOverOverlay").style.display="none";
  addTile(); addTile();
  draw();
}

/* TILE */
function addTile(){
  let empty=[];
  for(let i=0;i<SIZE;i++)
    for(let j=0;j<SIZE;j++)
      if(board[i][j]==0) empty.push({i,j});

  if(empty.length){
    let t=empty[Math.floor(Math.random()*empty.length)];
    board[t.i][t.j]=Math.random()<0.9?2:4;
  }
}

/* DRAW */
function draw(){
  const grid=document.getElementById("grid");
  grid.innerHTML='';

  for(let i=0;i<SIZE;i++){
    for(let j=0;j<SIZE;j++){

      let bg=document.createElement("div");
      bg.className="grid-background";
      bg.style.left=j*80+'px';
      bg.style.top=i*80+'px';
      grid.appendChild(bg);

      if(board[i][j]){
        let c=document.createElement("div");
        c.className="cell";
        c.setAttribute("data-value",board[i][j]);
        c.textContent=board[i][j];
        c.style.left=j*80+'px';
        c.style.top=i*80+'px';
        grid.appendChild(c);
      }
    }
  }

  document.getElementById("score").textContent=score;
  document.getElementById("best").textContent=best;
}

/* MOVE */
function slide(line){
  line=line.filter(v=>v);
  for(let i=0;i<line.length-1;i++){
    if(line[i]==line[i+1]){
      line[i]*=2;
      score+=line[i];
      line.splice(i+1,1);
    }
  }
  while(line.length<SIZE) line.push(0);
  return line;
}

function move(dir){
  if(gameOver) return;
  let moved=false;
  let newBoard=JSON.parse(JSON.stringify(board));

  if(dir==='left'){
    for(let i=0;i<SIZE;i++){
      let r=slide(newBoard[i]);
      if(JSON.stringify(r)!==JSON.stringify(newBoard[i])) moved=true;
      newBoard[i]=r;
    }
  }

  if(dir==='right'){
    for(let i=0;i<SIZE;i++){
      let r=slide(newBoard[i].reverse()).reverse();
      if(JSON.stringify(r)!==JSON.stringify(board[i])) moved=true;
      newBoard[i]=r;
    }
  }

  if(dir==='up'){
    for(let j=0;j<SIZE;j++){
      let col=[];
      for(let i=0;i<SIZE;i++) col.push(newBoard[i][j]);
      col=slide(col);
      for(let i=0;i<SIZE;i++){
        if(newBoard[i][j]!=col[i]) moved=true;
        newBoard[i][j]=col[i];
      }
    }
  }

  if(dir==='down'){
    for(let j=0;j<SIZE;j++){
      let col=[];
      for(let i=0;i<SIZE;i++) col.push(newBoard[i][j]);
      col=slide(col.reverse()).reverse();
      for(let i=0;i<SIZE;i++){
        if(newBoard[i][j]!=col[i]) moved=true;
        newBoard[i][j]=col[i];
      }
    }
  }

  if(moved){
    board=newBoard;
    addTile();
    draw();

    if(checkGameOver()){
      gameOver=true;
      if(score>best){
        best=score;
        localStorage.setItem("best2048",best);
      }
      document.getElementById("gameOverOverlay").style.display="flex";
      document.getElementById("finalScore").textContent="Score: "+score;
    }
  }
}

/* INPUTS */
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") move("left");
  if(e.key==="ArrowRight") move("right");
  if(e.key==="ArrowUp") move("up");
  if(e.key==="ArrowDown") move("down");
});

/* TOUCH */
let sx,sy;
const gridWrapper=document.querySelector(".grid-wrapper");

gridWrapper.addEventListener("touchstart",e=>{
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
});

gridWrapper.addEventListener("touchend",e=>{
  let dx=sx-e.changedTouches[0].clientX;
  let dy=sy-e.changedTouches[0].clientY;

  if(Math.abs(dx)>Math.abs(dy)){
    move(dx>0?'left':'right');
  } else {
    move(dy>0?'up':'down');
  }
});

/* MOUSE */
let dragging=false,mx,my;

gridWrapper.addEventListener("mousedown",e=>{
  dragging=true;
  mx=e.clientX; my=e.clientY;
});

document.addEventListener("mouseup",()=>dragging=false);

document.addEventListener("mousemove",e=>{
  if(!dragging) return;

  let dx=e.clientX-mx;
  let dy=e.clientY-my;

  if(Math.abs(dx)>40||Math.abs(dy)>40){
    if(Math.abs(dx)>Math.abs(dy)){
      move(dx>0?'right':'left');
    } else {
      move(dy>0?'down':'up');
    }
    dragging=false;
  }
});

newGame();
</script>

</body>
</html>
