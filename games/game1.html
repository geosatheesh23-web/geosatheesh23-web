<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 Drag Mode - GameHub</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #faf8ef, #e6ded2);
    text-align: center;
    min-height: 100vh;
}

header {
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
    background: #fff;
    position: sticky;
    top: 0;
}

.grid {
    width: 360px;
    height: 360px;
    margin: 30px auto;
    background: #bbada0;
    border-radius: 12px;
    position: relative;
    touch-action: none;
}

.cell {
    position: absolute;
    width: 90px;
    height: 90px;
    background: #d6d0c4;
    border-radius: 10px;
}

.tile {
    position: absolute;
    width: 90px;
    height: 90px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: bold;
    transition: left 0.12s, top 0.12s;
}

[data-v="2"] { background:#eee4da; }
[data-v="4"] { background:#ede0c8; }
[data-v="8"] { background:#f2b179; color:white; }
[data-v="16"] { background:#f59563; color:white; }
[data-v="32"] { background:#f67c5f; color:white; }
[data-v="64"] { background:#f65e3b; color:white; }
[data-v="128"] { background:#edcf72; color:white; }
[data-v="256"] { background:#edcc61; color:white; }
[data-v="512"] { background:#edc850; color:white; }
[data-v="1024"] { background:#edc53f; color:white; }
[data-v="2048"] { background:#edc22e; color:white; }

button {
    padding: 10px 15px;
    border: none;
    background: #8f7a66;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

</style>
</head>

<body>

<header>
    <div>🎮 GameHub</div>
    <button onclick="window.location.href='../index.html'">🏠 Home</button>
</header>

<h1>Drag 2048</h1>

<div class="grid" id="grid"></div>

<script>
const grid = document.getElementById("grid");
const SIZE = 4;
const TILE = 90;
const GAP = 0;

let board = [];
let tiles = [];

let startX, startY, dragging = false;

/* INIT */
function init() {
    board = Array.from({length: SIZE}, () => Array(SIZE).fill(0));

    addTile();
    addTile();

    drawGrid();
    render();
}

/* ADD TILE */
function addTile() {
    let empty = [];
    for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
            if (!board[y][x]) empty.push({x,y});
        }
    }

    if (!empty.length) return;

    let spot = empty[Math.floor(Math.random() * empty.length)];
    board[spot.y][spot.x] = Math.random() < 0.9 ? 2 : 4;
}

/* DRAW GRID */
function drawGrid() {
    grid.innerHTML = "";

    for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
            let c = document.createElement("div");
            c.className = "cell";
            c.style.left = x * TILE + "px";
            c.style.top = y * TILE + "px";
            grid.appendChild(c);
        }
    }
}

/* RENDER */
function render() {
    document.querySelectorAll(".tile").forEach(t => t.remove());

    for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
            let val = board[y][x];
            if (!val) continue;

            let t = document.createElement("div");
            t.className = "tile";
            t.textContent = val;
            t.dataset.v = val;

            t.style.left = x * TILE + "px";
            t.style.top = y * TILE + "px";

            grid.appendChild(t);
        }
    }
}

/* MOVE LOGIC (DRAG SHIFT) */
function shift(dx, dy) {
    let newBoard = Array.from({length: SIZE}, () => Array(SIZE).fill(0));

    let orderX = dx > 0 ? [3,2,1,0] : [0,1,2,3];
    let orderY = dy > 0 ? [3,2,1,0] : [0,1,2,3];

    for (let y of orderY) {
        for (let x of orderX) {
            let val = board[y][x];
            if (!val) continue;

            let nx = x;
            let ny = y;

            while (
                nx + Math.sign(dx) >= 0 &&
                nx + Math.sign(dx) < SIZE &&
                ny + Math.sign(dy) >= 0 &&
                ny + Math.sign(dy) < SIZE &&
                newBoard[ny + Math.sign(dy)][nx + Math.sign(dx)] === 0
            ) {
                nx += Math.sign(dx);
                ny += Math.sign(dy);
            }

            newBoard[ny][nx] = val;
        }
    }

    board = newBoard;
    addTile();
    render();
}

/* INPUT */
grid.addEventListener("pointerdown", e => {
    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
});

grid.addEventListener("pointerup", e => {
    if (!dragging) return;
    dragging = false;

    let dx = e.clientX - startX;
    let dy = e.clientY - startY;

    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;

    shift(dx, dy);
});

init();
</script>

</body>
</html>
