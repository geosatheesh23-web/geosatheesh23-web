<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>

<link rel="stylesheet" href="../assets/css/style.css">

<style>
#game-container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.grid-wrapper {
  background: #bbada0;
  border-radius: 6px;
  padding: 10px;
  width: 340px;
  height: 340px;
  position: relative;
}

.grid-container {
  position: relative;
  width: 100%;
  height: 100%;
}

.grid-background {
  position: absolute;
  width: 70px;
  height: 70px;
  background: #d4d0c8;
  border-radius: 3px;
}

.cell {
  position: absolute;
  width: 70px;
  height: 70px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  font-size: 30px;
  border-radius: 3px;
}

.cell[data-value="2"] { background: #eee4da; }
.cell[data-value="4"] { background: #ede0c8; }
.cell[data-value="8"] { background: #f2b179; color: white; }
.cell[data-value="16"] { background: #f59563; color: white; }
.cell[data-value="32"] { background: #f67c5f; color: white; }
.cell[data-value="64"] { background: #f65e3b; color: white; }
.cell[data-value="128"] { background: #edcf72; }
.cell[data-value="256"] { background: #edcc61; }
.cell[data-value="512"] { background: #edc850; }
.cell[data-value="1024"] { background: #edc53f; }
.cell[data-value="2048"] { background: #edc22e; }

.score {
  margin: 10px;
}
</style>
</head>

<body>

<header class="main-header">
  <div class="logo">🎮 GameHub</div>
  <nav>
    <a href="../index.html">Home</a>
    <a href="../more.html">More</a>
  </nav>
</header>

<section class="game-container">

<h2>2048</h2>
<div class="score">
  Score: <span id="score">0</span> |
  Best: <span id="best">0</span>
</div>

<div id="game-container">
  <div class="grid-wrapper">
    <div class="grid-container" id="grid"></div>
  </div>

  <button onclick="newGame()">Restart</button>
</div>

</section>

<div class="game-over-overlay" id="gameOverOverlay" style="display:none;">
  <h2 id="gameOverTitle"></h2>
  <p>Score: <span id="finalScore"></span></p>
  <p>Best: <span id="finalBest"></span></p>
  <button onclick="newGame()">Play Again</button>
</div>

<script>
let board = [];
let score = 0;
let bestScore = localStorage.getItem('2048bestScore') || 0;
const SIZE = 4;
let gameOver = false;

let touchStartX = 0, touchStartY = 0;

function newGame() {
  board = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  score = 0;
  gameOver = false;
  document.getElementById('gameOverOverlay').style.display = 'none';

  addNewTile();
  addNewTile();
  updateDisplay();
}

function addNewTile() {
  let empty = [];
  for (let i=0;i<SIZE;i++)
    for (let j=0;j<SIZE;j++)
      if (board[i][j]===0) empty.push({i,j});

  if (empty.length) {
    let t = empty[Math.floor(Math.random()*empty.length)];
    board[t.i][t.j] = Math.random()<0.9 ? 2 : 4;
  }
}

function updateDisplay() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  for (let i=0;i<SIZE;i++) {
    for (let j=0;j<SIZE;j++) {
      let bg = document.createElement('div');
      bg.className='grid-background';
      bg.style.left = j*80+'px';
      bg.style.top = i*80+'px';
      grid.appendChild(bg);

      if (board[i][j]) {
        let cell=document.createElement('div');
        cell.className='cell';
        cell.setAttribute('data-value',board[i][j]);
        cell.textContent=board[i][j];
        cell.style.left=j*80+'px';
        cell.style.top=i*80+'px';
        grid.appendChild(cell);
      }
    }
  }

  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = bestScore;
}

function slide(line) {
  line=line.filter(v=>v);
  for(let i=0;i<line.length-1;i++){
    if(line[i]===line[i+1]){
      line[i]*=2;
      score+=line[i];
      line.splice(i+1,1);
    }
  }
  while(line.length<SIZE) line.push(0);
  return line;
}

function move(dir){
  if(gameOver) return;
  let moved=false;
  let newBoard=JSON.parse(JSON.stringify(board));

  if(dir==='left'){
    for(let i=0;i<SIZE;i++){
      let r=slide(newBoard[i]);
      if(JSON.stringify(r)!==JSON.stringify(newBoard[i])) moved=true;
      newBoard[i]=r;
    }
  }

  if(dir==='right'){
    for(let i=0;i<SIZE;i++){
      let r=slide(newBoard[i].reverse()).reverse();
      if(JSON.stringify(r)!==JSON.stringify(board[i])) moved=true;
      newBoard[i]=r;
    }
  }

  if(dir==='up'){
    for(let j=0;j<SIZE;j++){
      let col=[];
      for(let i=0;i<SIZE;i++) col.push(newBoard[i][j]);
      col=slide(col);
      for(let i=0;i<SIZE;i++){
        if(newBoard[i][j]!==col[i]) moved=true;
        newBoard[i][j]=col[i];
      }
    }
  }

  if(dir==='down'){
    for(let j=0;j<SIZE;j++){
      let col=[];
      for(let i=0;i<SIZE;i++) col.push(newBoard[i][j]);
      col=slide(col.reverse()).reverse();
      for(let i=0;i<SIZE;i++){
        if(newBoard[i][j]!==col[i]) moved=true;
        newBoard[i][j]=col[i];
      }
    }
  }

  if(moved){
    board=newBoard;
    addNewTile();
    updateDisplay();

    if(checkGameOver()){
      gameOver=true;
      if(score>bestScore){
        bestScore=score;
        localStorage.setItem('2048bestScore',bestScore);
      }
      showGameOver();
    }
  }
}

function checkGameOver(){
  for(let i=0;i<SIZE;i++){
    for(let j=0;j<SIZE;j++){
      if(board[i][j]===0) return false;
      if(j<3 && board[i][j]===board[i][j+1]) return false;
      if(i<3 && board[i][j]===board[i+1][j]) return false;
    }
  }
  return true;
}

function showGameOver(){
  document.getElementById('gameOverOverlay').style.display='block';
  document.getElementById('finalScore').textContent=score;
  document.getElementById('finalBest').textContent=bestScore;
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft') move('left');
  if(e.key==='ArrowRight') move('right');
  if(e.key==='ArrowUp') move('up');
  if(e.key==='ArrowDown') move('down');
});

const grid=document.getElementById('grid');

grid.addEventListener('touchstart',e=>{
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
});

grid.addEventListener('touchend',e=>{
  let dx=touchStartX-e.changedTouches[0].clientX;
  let dy=touchStartY-e.changedTouches[0].clientY;

  if(Math.abs(dx)>Math.abs(dy)){
    move(dx>0?'left':'right');
  }else{
    move(dy>0?'up':'down');
  }
});

let mx,my,down=false;

grid.addEventListener('mousedown',e=>{
  down=true;
  mx=e.clientX;
  my=e.clientY;
});

document.addEventListener('mouseup',()=>down=false);

document.addEventListener('mousemove',e=>{
  if(!down) return;
  let dx=mx-e.clientX;
  let dy=my-e.clientY;

  if(Math.abs(dx)>30||Math.abs(dy)>30){
    if(Math.abs(dx)>Math.abs(dy)){
      move(dx>0?'left':'right');
    }else{
      move(dy>0?'up':'down');
    }
    down=false;
  }
});

newGame();
</script>

</body>
</html>
