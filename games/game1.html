<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="assets/css/style.css">
<title>2048</title>

<style>
* {
    box-sizing: border-box;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: linear-gradient(135deg, #faf8ef, #e6ded2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* GAME */
#game {
    text-align: center;
}

h1 {
    font-size: 64px;
    margin: 0;
    color: #776e65;
}

/* SCORE */
.score-wrap {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 10px;
}

.score-box {
    background: #bbada0;
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: bold;
}

/* GRID */
.grid {
    width: 360px;
    height: 360px;
    margin: 25px auto;
    background: #bbada0;
    border-radius: 12px;
    padding: 10px;
    position: relative;
}

.bg {
    position: absolute;
    width: 75px;
    height: 75px;
    background: #d6d0c4;
    border-radius: 6px;
}

/* TILE */
.tile {
    position: absolute;
    width: 75px;
    height: 75px;
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 26px;
    transition: all 0.12s ease;
}

/* POP */
.tile.new {
    animation: pop 0.2s ease;
}
@keyframes pop {
    from {transform: scale(0);}
    to {transform: scale(1);}
}

/* MERGE EFFECT */
.tile.merge {
    animation: merge 0.2s ease;
}
@keyframes merge {
    0% {transform: scale(1);}
    50% {transform: scale(1.25);}
    100% {transform: scale(1);}
}

/* WIN GLOW */
.win {
    animation: glow 1s infinite alternate;
}
@keyframes glow {
    from {box-shadow: 0 0 10px gold;}
    to {box-shadow: 0 0 25px gold;}
}

/* COLORS */
.tile[data-v="2"] { background:#eee4da; }
.tile[data-v="4"] { background:#ede0c8; }
.tile[data-v="8"] { background:#f2b179; color:white; }
.tile[data-v="16"] { background:#f59563; color:white; }
.tile[data-v="32"] { background:#f67c5f; color:white; }
.tile[data-v="64"] { background:#f65e3b; color:white; }
.tile[data-v="128"] { background:#edcf72; color:white; }
.tile[data-v="256"] { background:#edcc61; color:white; }
.tile[data-v="512"] { background:#edc850; color:white; }
.tile[data-v="1024"] { background:#edc53f; color:white; }
.tile[data-v="2048"] { background:#edc22e; color:white; }

/* BUTTON */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    background: #8f7a66;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    display: none;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}

.popup {
    background: white;
    padding: 40px;
    border-radius: 10px;
    text-align: center;
}
</style>
</head>

<body>

<div id="game">

<h1>2048</h1>

<div class="score-wrap">
    <div class="score-box">Score<br><span id="score">0</span></div>
    <div class="score-box">Best<br><span id="best">0</span></div>
</div>

<div class="grid" id="grid"></div>

<button onclick="newGame()">New Game</button>

</div>

<div class="overlay" id="overlay">
    <div class="popup">
        <h2 id="result"></h2>
        <p id="final"></p>
        <button onclick="newGame()">Play Again</button>
    </div>
</div>

<script>
let board=[],score=0;
let best=localStorage.getItem("best2048")||0;
const SIZE=4;
let gameOver=false,won=false;

/* INIT */
function newGame(){
    board=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
    score=0;
    gameOver=false;
    won=false;
    overlay.style.display="none";
    add(true); add(true);
    draw();
}

function add(isNew=false){
    let empty=[];
    for(let i=0;i<SIZE;i++)
    for(let j=0;j<SIZE;j++)
        if(board[i][j]==0) empty.push({i,j});

    if(empty.length){
        let t=empty[Math.floor(Math.random()*empty.length)];
        board[t.i][t.j]=Math.random()<0.9?2:4;
        if(isNew) board[t.i][t.j]+="n";
    }
}

function draw(){
    grid.innerHTML='';

    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){

            let bg=document.createElement("div");
            bg.className="bg";
            bg.style.left=j*85+"px";
            bg.style.top=i*85+"px";
            grid.appendChild(bg);

            if(board[i][j]){
                let val=parseInt(board[i][j]);
                let t=document.createElement("div");
                t.className="tile";
                if(board[i][j].toString().includes("n")) t.classList.add("new");
                t.dataset.v=val;
                t.textContent=val;

                if(val===2048 && !won){
                    t.classList.add("win");
                    won=true;
                    show("You Win!");
                }

                t.style.left=j*85+"px";
                t.style.top=i*85+"px";
                grid.appendChild(t);
            }
        }
    }

    scoreEl.textContent=score;
    bestEl.textContent=best;
}

function slide(row){
    row=row.filter(v=>v);
    for(let i=0;i<row.length-1;i++){
        if(parseInt(row[i])===parseInt(row[i+1])){
            row[i]=parseInt(row[i])*2;
            score+=row[i];
            row[i]+="m";
            row.splice(i+1,1);
        }
    }
    while(row.length<SIZE) row.push(0);
    return row;
}

function move(dir){
    if(gameOver) return;

    let moved=false;
    let newB=JSON.parse(JSON.stringify(board));

    function getCol(j){
        return newB.map(r=>r[j]);
    }

    function setCol(j,col){
        for(let i=0;i<SIZE;i++) newB[i][j]=col[i];
    }

    if(dir=="left"){
        for(let i=0;i<SIZE;i++){
            let r=slide(newB[i]);
            if(JSON.stringify(r)!=JSON.stringify(newB[i])) moved=true;
            newB[i]=r;
        }
    }

    if(dir=="right"){
        for(let i=0;i<SIZE;i++){
            let r=slide(newB[i].reverse()).reverse();
            if(JSON.stringify(r)!=JSON.stringify(newB[i])) moved=true;
            newB[i]=r;
        }
    }

    if(dir=="up"){
        for(let j=0;j<SIZE;j++){
            let c=slide(getCol(j));
            if(JSON.stringify(c)!=JSON.stringify(getCol(j))) moved=true;
            setCol(j,c);
        }
    }

    if(dir=="down"){
        for(let j=0;j<SIZE;j++){
            let c=slide(getCol(j).reverse()).reverse();
            if(JSON.stringify(c)!=JSON.stringify(getCol(j))) moved=true;
            setCol(j,c);
        }
    }

    if(moved){
        board=newB;
        add(true);
        draw();

        if(score>best){
            best=score;
            localStorage.setItem("best2048",best);
        }

        if(checkGameOver()){
            gameOver=true;
            show("Game Over");
        }
    }
}

function checkGameOver(){
    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            if(board[i][j]==0) return false;
            if(j<3 && parseInt(board[i][j])===parseInt(board[i][j+1])) return false;
            if(i<3 && parseInt(board[i][j])===parseInt(board[i+1][j])) return false;
        }
    }
    return true;
}

function show(text){
    result.textContent=text;
    final.textContent="Score: "+score;
    overlay.style.display="flex";
}

/* CONTROLS */
document.addEventListener("keydown",e=>{
    if(e.key==="ArrowLeft") move("left");
    if(e.key==="ArrowRight") move("right");
    if(e.key==="ArrowUp") move("up");
    if(e.key==="ArrowDown") move("down");
});

/* TOUCH */
let sx,sy;
document.addEventListener("touchstart",e=>{
    sx=e.touches[0].clientX;
    sy=e.touches[0].clientY;
});
document.addEventListener("touchend",e=>{
    let dx=sx-e.changedTouches[0].clientX;
    let dy=sy-e.changedTouches[0].clientY;

    if(Math.abs(dx)>Math.abs(dy)){
        if(dx>50) move("left");
        else if(dx<-50) move("right");
    } else {
        if(dy>50) move("up");
        else if(dy<-50) move("down");
    }
});

/* MOUSE DRAG */
let down=false,mx,my;
document.addEventListener("mousedown",e=>{
    down=true; mx=e.clientX; my=e.clientY;
});
document.addEventListener("mouseup",()=>down=false);
document.addEventListener("mousemove",e=>{
    if(!down)return;

    let dx=mx-e.clientX;
    let dy=my-e.clientY;

    if(Math.abs(dx)>40 || Math.abs(dy)>40){
        if(Math.abs(dx)>Math.abs(dy)){
            move(dx>0?"left":"right");
        } else {
            move(dy>0?"up":"down");
        }
        down=false;
    }
});

const grid=document.getElementById("grid");
const scoreEl=document.getElementById("score");
const bestEl=document.getElementById("best");
const overlay=document.getElementById("overlay");
const result=document.getElementById("result");
const final=document.getElementById("final");

newGame();
</script>

</body>

  </nav>

</html>
