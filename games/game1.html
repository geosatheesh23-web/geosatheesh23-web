<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 Watch Mode</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #faf8ef;
    text-align: center;
    overflow: hidden;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    font-size: 14px;
}

/* GRID */
.grid {
    width: 280px;
    height: 280px;
    margin: 10px auto;
    background: #bbada0;
    border-radius: 10px;
    position: relative;
    touch-action: none;
}

/* CELL */
.cell {
    position: absolute;
    width: 70px;
    height: 70px;
    background: #d6d0c4;
    border-radius: 6px;
}

/* TILE */
.tile {
    position: absolute;
    width: 70px;
    height: 70px;
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 18px;
    transition: 0.1s;
}

[data-v="2"] { background:#eee4da; }
[data-v="4"] { background:#ede0c8; }
[data-v="8"] { background:#f2b179; color:#fff; }
[data-v="16"] { background:#f59563; color:#fff; }
[data-v="32"] { background:#f67c5f; color:#fff; }
[data-v="64"] { background:#f65e3b; color:#fff; }
[data-v="128"] { background:#edcf72; color:#fff; }
[data-v="256"] { background:#edcc61; color:#fff; }
[data-v="512"] { background:#edc850; color:#fff; }
[data-v="1024"] { background:#edc53f; color:#fff; }
[data-v="2048"] { background:#edc22e; color:#fff; }

button {
    font-size: 12px;
    padding: 6px 10px;
    border: none;
    border-radius: 6px;
    background: #8f7a66;
    color: white;
}
</style>
</head>

<body>

<header>
    <div>⌚ 2048</div>
    <button onclick="window.location.href='../index.html'">Home</button>
</header>

<div class="grid" id="grid"></div>

<script>
const SIZE = 4;
const TILE = 70;

let board = [];

const grid = document.getElementById("grid");

let startX = 0, startY = 0;

/* INIT */
function init() {
    board = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
    spawn();
    spawn();
    drawGrid();
    render();
}

/* SPAWN */
function spawn() {
    let empty = [];
    for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
            if (!board[y][x]) empty.push({x,y});
        }
    }
    if (!empty.length) return;

    let spot = empty[Math.floor(Math.random() * empty.length)];
    board[spot.y][spot.x] = Math.random() < 0.9 ? 2 : 4;
}

/* GRID BACKGROUND */
function drawGrid() {
    grid.innerHTML = "";
    for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
            let c = document.createElement("div");
            c.className = "cell";
            c.style.left = x * TILE + "px";
            c.style.top = y * TILE + "px";
            grid.appendChild(c);
        }
    }
}

/* RENDER */
function render() {
    document.querySelectorAll(".tile").forEach(t => t.remove());

    for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
            let v = board[y][x];
            if (!v) continue;

            let t = document.createElement("div");
            t.className = "tile";
            t.textContent = v;
            t.dataset.v = v;

            t.style.left = x * TILE + "px";
            t.style.top = y * TILE + "px";

            grid.appendChild(t);
        }
    }
}

/* MOVE */
function move(dir) {
    let newB = JSON.parse(JSON.stringify(board));

    const getCol = j => newB.map(r => r[j]);
    const setCol = (j, col) => col.forEach((v,i)=> newB[i][j]=v);

    function slide(row){
        row = row.filter(v=>v);
        for(let i=0;i<row.length-1;i++){
            if(row[i]===row[i+1]){
                row[i]*=2;
                row[i+1]=0;
            }
        }
        return row.filter(v=>v);
    }

    function pad(row){
        while(row.length<4) row.push(0);
        return row;
    }

    if(dir==="left"){
        for(let i=0;i<4;i++) newB[i]=pad(slide(newB[i]));
    }
    if(dir==="right"){
        for(let i=0;i<4;i++) newB[i]=pad(slide([...newB[i]].reverse()).reverse());
    }
    if(dir==="up"){
        for(let j=0;j<4;j++) setCol(j,pad(slide(getCol(j))));
    }
    if(dir==="down"){
        for(let j=0;j<4;j++) setCol(j,pad(slide(getCol(j).reverse()).reverse()));
    }

    board = newB;
    spawn();
    render();
}

/* SWIPE */
grid.addEventListener("pointerdown", e=>{
    startX = e.clientX;
    startY = e.clientY;
});

grid.addEventListener("pointerup", e=>{
    let dx = e.clientX - startX;
    let dy = e.clientY - startY;

    if(Math.abs(dx)>Math.abs(dy)){
        move(dx>0?"right":"left");
    }else{
        move(dy>0?"down":"up");
    }
});

init();
</script>

</body>
</html>
