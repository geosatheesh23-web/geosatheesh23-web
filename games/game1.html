<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 - Clean</title>

<style>
* {
    box-sizing: border-box;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #faf8ef;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

#game {
    text-align: center;
}

h1 {
    font-size: 60px;
    margin: 10px 0;
    color: #776e65;
}

.score-wrap {
    display: flex;
    justify-content: center;
    gap: 15px;
}

.score-box {
    background: #bbada0;
    color: #fff;
    padding: 10px 15px;
    border-radius: 8px;
    font-weight: bold;
}

.grid {
    width: 360px;
    height: 360px;
    margin: 20px auto;
    background: #bbada0;
    border-radius: 10px;
    padding: 10px;
    position: relative;
}

.bg {
    position: absolute;
    width: 75px;
    height: 75px;
    background: #d6d0c4;
    border-radius: 6px;
}

.tile {
    position: absolute;
    width: 75px;
    height: 75px;
    background: #eee4da;
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    font-weight: bold;
}

.tile[data-v="4"] { background:#ede0c8; }
.tile[data-v="8"] { background:#f2b179; color:white; }
.tile[data-v="16"] { background:#f59563; color:white; }
.tile[data-v="32"] { background:#f67c5f; color:white; }
.tile[data-v="64"] { background:#f65e3b; color:white; }
.tile[data-v="128"] { background:#edcf72; color:white; }
.tile[data-v="256"] { background:#edcc61; color:white; }
.tile[data-v="512"] { background:#edc850; color:white; }
.tile[data-v="1024"] { background:#edc53f; color:white; }
.tile[data-v="2048"] { background:#edc22e; color:white; }

button {
    margin-top: 10px;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    background: #8f7a66;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup {
    background: white;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
}
</style>
</head>

<body>

<div id="game">
    <h1>2048</h1>

    <div class="score-wrap">
        <div class="score-box">Score <span id="score">0</span></div>
        <div class="score-box">Best <span id="best">0</span></div>
    </div>

    <div class="grid" id="grid"></div>

    <button onclick="newGame()">New Game</button>
</div>

<div class="overlay" id="overlay">
    <div class="popup">
        <h2 id="msg"></h2>
        <p id="final"></p>
        <button onclick="newGame()">Play Again</button>
    </div>
</div>

<script>
let board, score = 0;
let best = localStorage.getItem("best2048") || 0;
const SIZE = 4;

const grid = document.getElementById("grid");
const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const overlay = document.getElementById("overlay");
const msg = document.getElementById("msg");
const final = document.getElementById("final");

/* INIT */
function newGame() {
    board = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    score = 0;
    overlay.style.display = "none";
    spawn();
    spawn();
    render();
}

/* SPAWN */
function spawn() {
    let empty = [];

    for (let i = 0; i < SIZE; i++) {
        for (let j = 0; j < SIZE; j++) {
            if (board[i][j] === 0) empty.push({ i, j });
        }
    }

    if (!empty.length) return;

    let spot = empty[Math.floor(Math.random() * empty.length)];
    board[spot.i][spot.j] = Math.random() < 0.9 ? 2 : 4;
}

/* SLIDE */
function slide(row) {
    row = row.filter(v => v);

    for (let i = 0; i < row.length - 1; i++) {
        if (row[i] === row[i + 1]) {
            row[i] *= 2;
            score += row[i];
            row[i + 1] = 0;
        }
    }

    return row.filter(v => v);
}

function pad(row) {
    while (row.length < SIZE) row.push(0);
    return row;
}

/* MOVE */
function move(dir) {
    let old = JSON.stringify(board);
    let newB = JSON.parse(JSON.stringify(board));

    const getCol = j => newB.map(r => r[j]);
    const setCol = (j, col) => col.forEach((v, i) => newB[i][j] = v);

    if (dir === "left") {
        for (let i = 0; i < SIZE; i++) {
            newB[i] = pad(slide(newB[i]));
        }
    }

    if (dir === "right") {
        for (let i = 0; i < SIZE; i++) {
            newB[i] = pad(slide([...newB[i]].reverse()).reverse());
        }
    }

    if (dir === "up") {
        for (let j = 0; j < SIZE; j++) {
            setCol(j, pad(slide(getCol(j))));
        }
    }

    if (dir === "down") {
        for (let j = 0; j < SIZE; j++) {
            setCol(j, pad(slide(getCol(j).reverse()).reverse()));
        }
    }

    if (JSON.stringify(newB) !== old) {
        board = newB;
        spawn();
        saveBest();
        checkGameOver();
        render();
    }
}

/* GAME OVER */
function checkGameOver() {
    for (let i = 0; i < SIZE; i++) {
        for (let j = 0; j < SIZE; j++) {
            if (board[i][j] === 0) return;
            if (j < 3 && board[i][j] === board[i][j + 1]) return;
            if (i < 3 && board[i][j] === board[i + 1][j]) return;
        }
    }
    show("Game Over");
}

/* BEST */
function saveBest() {
    if (score > best) {
        best = score;
        localStorage.setItem("best2048", best);
    }
}

/* RENDER */
function render() {
    grid.innerHTML = "";

    for (let i = 0; i < SIZE; i++) {
        for (let j = 0; j < SIZE; j++) {

            let bg = document.createElement("div");
            bg.className = "bg";
            bg.style.left = j * 85 + "px";
            bg.style.top = i * 85 + "px";
            grid.appendChild(bg);

            let val = board[i][j];

            if (val) {
                let tile = document.createElement("div");
                tile.className = "tile";
                tile.textContent = val;
                tile.dataset.v = val;

                tile.style.left = j * 85 + "px";
                tile.style.top = i * 85 + "px";

                grid.appendChild(tile);
            }
        }
    }

    scoreEl.textContent = score;
    bestEl.textContent = best;
}

/* OVERLAY */
function show(text) {
    msg.textContent = text;
    final.textContent = "Score: " + score;
    overlay.style.display = "flex";
}

/* INPUT */
document.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft") move("left");
    if (e.key === "ArrowRight") move("right");
    if (e.key === "ArrowUp") move("up");
    if (e.key === "ArrowDown") move("down");
});

/* SWIPE */
let sx = 0, sy = 0;

document.addEventListener("touchstart", e => {
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
}, { passive: true });

document.addEventListener("touchend", e => {
    let dx = e.changedTouches[0].clientX - sx;
    let dy = e.changedTouches[0].clientY - sy;

    if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0) move("right");
        else move("left");
    } else {
        if (dy > 0) move("down");
        else move("up");
    }
}, { passive: true });

/* START */
newGame();
</script>

</body>
</html>
