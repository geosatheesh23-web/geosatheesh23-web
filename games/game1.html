<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games - 2048</title>

<style>
* { box-sizing: border-box; }

/* GLOBAL */
body {
    font-family: "Helvetica Neue", Arial, sans-serif;
    background: #faf8ef;
    margin: 0;
    opacity: 0;
    transition: opacity 0.4s ease;
    user-select: none;
}
body.loaded { opacity: 1; }

/* DARK MODE */
.dark {
    background: #121212;
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #222;
    color: white;
    padding: 15px 25px;
}

nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}
nav a:hover { color: #f2b179; }

/* DROPDOWN */
.dropdown { position: relative; }
.dropdown-content {
    display: none;
    position: absolute;
    background: #333;
    padding: 10px;
}
.dropdown:hover .dropdown-content { display: block; }

/* ORIGINAL GAME STYLING KEPT */
#game-container {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    margin: 20px auto;
    padding: 20px;
    max-width: 500px;
}

.game-header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    margin-bottom: 30px;
}

.score-container {
    display: flex;
    gap: 15px;
}

.score-box {
    background: #bbada0;
    padding: 15px 25px;
    text-align: center;
}

.grid-wrapper {
    background: #bbada0;
    padding: 10px;
    width: 340px;
    height: 340px;
    position: relative;
    cursor: grab;
    touch-action: none;
}

.grid-background {
    position: absolute;
    width: 70px;
    height: 70px;
    background: #d4d0c8;
}

.cell {
    position: absolute;
    width: 70px;
    height: 70px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 30px;
    transition: 0.15s;
}

.cell:hover { transform: scale(1.05); }

/* COLOR FIX (NON-BREAKING) */
.cell[data-value="8"],
.cell[data-value="16"],
.cell[data-value="32"],
.cell[data-value="64"],
.cell[data-value="128"],
.cell[data-value="256"],
.cell[data-value="512"],
.cell[data-value="1024"],
.cell[data-value="2048"] {
    color: white;
}

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    display: none;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}

.popup {
    background: white;
    padding: 40px;
    text-align: center;
}

/* PAGINATION */
.pagination {
    text-align: center;
    margin-top: 20px;
}
.pagination a {
    padding: 8px 12px;
    background: #333;
    color: white;
    margin: 3px;
    text-decoration: none;
}
</style>
</head>

<body>

<header>
    <div>🎮 GameHub</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="more.html">More</a>

        <div class="dropdown">
            <a href="#">Games ▼</a>
            <div class="dropdown-content">
                <a href="game1.html">2048</a><br>
                <a href="game2.html">Tic Tac Toe</a><br>
                <a href="game3.html">Game 3</a><br>
                <a href="game4.html">Game 4</a><br>
                <a href="game5.html">Game 5</a>
            </div>
        </div>
    </nav>

    <button onclick="toggleTheme()">🌙</button>
</header>

<div id="game-container">

<div class="game-header">
    <h1>2048</h1>

    <div class="score-container">
        <div class="score-box">Score<br><span id="score">0</span></div>
        <div class="score-box">Best<br><span id="best">0</span></div>
    </div>
</div>

<div class="grid-wrapper">
    <div id="grid"></div>
</div>

<button onclick="newGame()">New Game</button>

</div>

<div class="overlay" id="overlay">
    <div class="popup">
        <h2 id="resultTitle"></h2>
        <p id="finalScore"></p>
        <button onclick="newGame()">Play Again</button>
    </div>
</div>

<div class="pagination">
    <a href="game1.html">1</a>
    <a href="game2.html">2</a>
    <a href="game3.html">3</a>
    <a href="game4.html">4</a>
    <a href="game5.html">5</a>
</div>

<script>
let board=[],score=0;
let best=localStorage.getItem('best2048')||0;
const SIZE=4;
let gameOver=false,won=false;

/* THEME */
function toggleTheme(){
    document.body.classList.toggle("dark");
    localStorage.setItem("theme", document.body.classList.contains("dark"));
}
if(localStorage.getItem("theme")==="true") document.body.classList.add("dark");

/* PAGE LOAD */
window.onload=()=>document.body.classList.add("loaded");

/* ORIGINAL GAME LOGIC (UNCHANGED + win detection added) */

function newGame(){
    board=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
    score=0; gameOver=false; won=false;
    document.getElementById("overlay").style.display="none";
    add(); add(); draw();
}

function add(){
    let empty=[];
    for(let i=0;i<SIZE;i++)
        for(let j=0;j<SIZE;j++)
            if(board[i][j]==0) empty.push({i,j});
    if(empty.length){
        let t=empty[Math.floor(Math.random()*empty.length)];
        board[t.i][t.j]=Math.random()<0.9?2:4;
    }
}

function draw(){
    const g=document.getElementById("grid");
    g.innerHTML='';
    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            let bg=document.createElement("div");
            bg.className="grid-background";
            bg.style.left=j*80+"px";
            bg.style.top=i*80+"px";
            g.appendChild(bg);

            if(board[i][j]){
                let c=document.createElement("div");
                c.className="cell";
                c.setAttribute("data-value",board[i][j]);
                c.textContent=board[i][j];
                c.style.left=j*80+"px";
                c.style.top=i*80+"px";
                g.appendChild(c);
            }
        }
    }
    scoreEl.textContent=score;
    bestEl.textContent=best;
}

function slide(line){
    line=line.filter(v=>v);
    for(let i=0;i<line.length-1;i++){
        if(line[i]==line[i+1]){
            line[i]*=2;
            score+=line[i];
            if(line[i]==2048) won=true;
            line.splice(i+1,1);
        }
    }
    while(line.length<SIZE) line.push(0);
    return line;
}

function move(dir){
    if(gameOver) return;
    let moved=false;
    let newB=JSON.parse(JSON.stringify(board));

    if(dir=="left"){
        for(let i=0;i<SIZE;i++){
            let r=slide(newB[i]);
            if(JSON.stringify(r)!=JSON.stringify(newB[i])) moved=true;
            newB[i]=r;
        }
    }

    if(moved){
        board=newB;
        add();
        draw();

        if(won) show("You Won!");
        if(check()){
            gameOver=true;
            show("Game Over");
        }

        if(score>best){
            best=score;
            localStorage.setItem("best2048",best);
        }
    }
}

function check(){
    for(let i=0;i<SIZE;i++){
        for(let j=0;j<SIZE;j++){
            if(board[i][j]==0) return false;
        }
    }
    return true;
}

function show(text){
    document.getElementById("overlay").style.display="flex";
    document.getElementById("resultTitle").textContent=text;
    document.getElementById("finalScore").textContent="Score: "+score;
}

/* CONTROLS */
document.addEventListener("keydown",e=>{
    if(e.key=="ArrowLeft")move("left");
    if(e.key=="ArrowRight")move("right");
});

/* MOUSE FIXED */
let drag=false,mx,my;
const w=document.querySelector(".grid-wrapper");

w.addEventListener("mousedown",e=>{
    drag=true; mx=e.clientX; my=e.clientY;
});
document.addEventListener("mouseup",()=>drag=false);

document.addEventListener("mousemove",e=>{
    if(!drag)return;
    let dx=e.clientX-mx;
    if(Math.abs(dx)>40){
        move(dx>0?"right":"left");
        drag=false;
    }
});

const scoreEl=document.getElementById("score");
const bestEl=document.getElementById("best");

newGame();
</script>

</body>
</html>
