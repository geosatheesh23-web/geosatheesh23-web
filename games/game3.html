<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Arena</title>

<style>
body{margin:0;background:#0d0d0d;color:#fff;font-family:Arial;display:flex;height:100vh}
.left{width:25%;padding:10px}
.center{flex:1;display:flex;flex-direction:column;align-items:center}
.right{width:25%;padding:10px;overflow:auto}

.topbar{margin-bottom:10px}

#game{
width:420px;height:420px;
background:#111;border-radius:12px;
position:relative;overflow:hidden;
}

.target{
position:absolute;
border-radius:50%;
background:#00adb5;
cursor:pointer;
}

#overlay{
position:absolute;top:0;left:0;right:0;bottom:0;
display:flex;align-items:center;justify-content:center;
flex-direction:column;
background:rgba(0,0,0,0.6);
font-size:22px;
}

#pressureBar{
height:10px;background:#222;width:420px;margin-top:5px;border-radius:5px;overflow:hidden;
}
#pressure{height:100%;width:0%;background:#00ffcc;}

button,select{
padding:8px;margin:5px;background:#00adb5;
border:none;color:white;border-radius:6px;cursor:pointer;
}

canvas{width:100%;background:#000;border-radius:8px}
</style>
</head>

<body>

<div class="left">
<canvas id="graph" height="200"></canvas>
<div id="best"></div>
<div id="elo"></div>
<div id="rank"></div>
</div>

<div class="center">
<div class="topbar">
<select id="mode">
<option value="classic">Classic</option>
<option value="rush">Rush</option>
<option value="wave">Wave</option>
</select>
<button id="start">Start</button>
</div>

<div id="game">
<div id="overlay" style="display:none;"></div>
</div>

<div id="pressureBar"><div id="pressure"></div></div>

<div style="margin-top:10px;text-align:center;font-size:14px;">
Perfect &lt;200ms | Good &lt;400ms<br>
Miss = instant loss
</div>
</div>

<div class="right">
<h3>Leaderboard</h3>
<div id="panel"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyCBCF3KYPBdBzEl4XFDmbkzdfZGIR58wRg",
  authDomain: "reactionarena-12fed.firebaseapp.com",
  databaseURL: "https://reactionarena-12fed-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "reactionarena-12fed"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* USER */
let player = localStorage.getItem("name");
if(!player){
  player = prompt("Enter your name:");
  localStorage.setItem("name", player);
}

/* STATE */
let running=false, mode="classic";
let score=0, elo=parseInt(localStorage.getItem("elo")||1000);
let bests=JSON.parse(localStorage.getItem("bests")||'{}');
let history=[];
let pressure=0;
let currentTarget=null;

/* UI */
const game=document.getElementById("game");
const overlay=document.getElementById("overlay");
const panel=document.getElementById("panel");

/* SOUND */
function beep(freq){
let ctx=new AudioContext();
let o=ctx.createOscillator();
let g=ctx.createGain();
o.connect(g);g.connect(ctx.destination);
o.frequency.value=freq;
o.start();
g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.15);
}

/* START */
document.getElementById("start").onclick=()=>{
mode=document.getElementById("mode").value;
startGame();
};

function startGame(){
running=true;
score=0;
pressure=0;
history=[];
clearTarget();
overlay.style.display="none";

if(mode==="classic") classicLoop();
if(mode==="rush") rushLoop();
if(mode==="wave") waveLoop();
}

/* SPAWN */
function spawn(moving=false){
if(!running || currentTarget) return;

let flash=document.createElement("div");
flash.style.position="absolute";
flash.style.inset=0;
flash.style.background="rgba(255,255,255,0.08)";
game.appendChild(flash);

setTimeout(()=>{
flash.remove();
if(!running) return;

let t=document.createElement("div");
t.className="target";
t.style.width="50px";
t.style.height="50px";
t.style.left=Math.random()*370+"px";
t.style.top=Math.random()*370+"px";

let start=performance.now();
let clicked=false;

/* movement */
let dx=(Math.random()-0.5)*2;
let dy=(Math.random()-0.5)*2;
let move;
if(moving){
move=setInterval(()=>{
let x=parseFloat(t.style.left);
let y=parseFloat(t.style.top);
x+=dx; y+=dy;
if(x<0||x>370) dx*=-1;
if(y<0||y>370) dy*=-1;
t.style.left=x+"px";
t.style.top=y+"px";
},16);
}

let timeout=setTimeout(()=>{
if(!clicked) gameOver();
},900 - pressure*2);

t.onclick=(e)=>{
e.stopPropagation();
if(clicked) return;
clicked=true;

let rt=performance.now()-start;
history.push(rt);

if(rt<200){ score+=300; pressure+=10; beep(800);}
else if(rt<400){ score+=150; pressure+=5; beep(500);}
else{ score+=50; pressure-=5; beep(200);}

pressure=Math.max(0,Math.min(100,pressure));

clearTimeout(timeout);
clearInterval(move);

t.remove();
currentTarget=null;

updateUI();
};

game.appendChild(t);
currentTarget=t;

},180);
}

/* CLASSIC */
function classicLoop(){
let base=1100;

function loop(){
if(!running) return;

let moveChance = score>1000;
spawn(moveChance);

let variation=Math.sin(score/500)*200;
setTimeout(loop, base + variation - pressure*1.5);
}
loop();
}

/* RUSH */
function rushLoop(){
let speed=650;

function loop(){
if(!running) return;

spawn(true);
speed*=0.985;

setTimeout(loop, Math.max(180, speed - pressure*1.5));
}
loop();
}

/* WAVE */
function waveLoop(){
let wave=1;

function startWave(){
if(!running) return;

let required=wave*2;
let done=0;

overlay.style.display="flex";
overlay.innerHTML="Wave "+wave;
setTimeout(()=>overlay.style.display="none",800);

let timer=setTimeout(()=>{
if(done<required) gameOver();
},10000);

function next(){
if(!running) return;

if(done>=required){
clearTimeout(timer);

overlay.style.display="flex";
overlay.innerHTML="Wave "+wave+" Complete";

setTimeout(()=>{
overlay.style.display="none";
wave++;
startWave();
},800);

return;
}

spawn(false);

let check=setInterval(()=>{
if(history.length>done){
done++;
clearInterval(check);
next();
}
},10);
}

next();
}

startWave();
}

/* GAME OVER */
function gameOver(){
if(!running) return;
running=false;
clearTarget();

overlay.style.display="flex";
overlay.innerHTML=`Game Over<br>Score: ${Math.floor(score)}`;
beep(120);

/* ELO */
onValue(ref(db,"scores"),snap=>{
let data=snap.val()||{};
let vals=Object.values(data);
let avg=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:1000;

let expected=1/(1+Math.pow(10,(avg-elo)/400));
let actual=score>avg?1:0;

elo=Math.round(elo+32*(actual-expected));
localStorage.setItem("elo",elo);

updateUI();
},{onlyOnce:true});

/* SAVE */
if(!bests[mode]||score>bests[mode]){
bests[mode]=score;
localStorage.setItem("bests",JSON.stringify(bests));
}

set(ref(db,"scores/"+player),elo);
}

/* CLEAN */
function clearTarget(){
if(currentTarget){
currentTarget.remove();
currentTarget=null;
}
}

/* UI */
function updateUI(){
document.getElementById("best").innerHTML=
`Best: ${bests.classic||0}/${bests.rush||0}/${bests.wave||0}`;

document.getElementById("elo").innerHTML=`ELO: ${elo}`;
document.getElementById("rank").innerHTML=`Rank: ${getRank(elo)}`;
document.getElementById("pressure").style.width=pressure+"%";

drawGraph();
}

function getRank(e){
if(e<800)return"Iron";
if(e<1000)return"Bronze";
if(e<1200)return"Silver";
if(e<1400)return"Gold";
if(e<1600)return"Platinum";
if(e<1800)return"Diamond";
return"Master";
}

/* GRAPH */
function drawGraph(){
let ctx=graph.getContext("2d");
ctx.clearRect(0,0,graph.width,graph.height);

if(history.length<2) return;

let max=Math.max(...history);
let step=graph.width/history.length;

ctx.beginPath();
history.forEach((v,i)=>{
let x=i*step;
let y=graph.height-(v/max)*graph.height;
if(i===0)ctx.moveTo(x,y);
else ctx.lineTo(x,y);
});
ctx.strokeStyle="#00adb5";
ctx.stroke();
}

/* LEADERBOARD */
onValue(ref(db,"scores"),snap=>{
let data=snap.val()||{};
let arr=Object.entries(data).sort((a,b)=>b[1]-a[1]);

panel.innerHTML="";
arr.slice(0,10).forEach((p,i)=>{
panel.innerHTML+=`${i+1}. ${p[0]} - ${p[1]}<br>`;
});

let rank=arr.findIndex(p=>p[0]===player)+1;
panel.innerHTML+=`<hr>Your Rank: ${rank}`;
});

updateUI();
</script>

</body>
</html>
