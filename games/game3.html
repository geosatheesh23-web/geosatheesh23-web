<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Arena</title>

<style>
body{margin:0;background:#0d0d0d;color:#fff;font-family:Arial;display:flex;height:100vh}
.left{width:25%;padding:10px}
.center{flex:1;display:flex;flex-direction:column;align-items:center}
.right{width:25%;padding:10px;overflow:auto}

.topbar{margin-bottom:10px}

#game{
width:420px;height:420px;background:#111;border-radius:12px;
position:relative;overflow:hidden;
}

.target{
position:absolute;border-radius:50%;background:#00adb5;cursor:pointer;
}

#pressureBar{
height:10px;background:#222;margin-top:5px;border-radius:5px;overflow:hidden;
}
#pressure{
height:100%;width:0%;background:#00ffcc;
}

#gameOver{
position:absolute;top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.8);
display:none;align-items:center;justify-content:center;flex-direction:column;
}

button,select{
padding:8px;margin:5px;background:#00adb5;border:none;color:white;border-radius:6px;cursor:pointer;
}

canvas{width:100%;background:#000;border-radius:8px}
</style>
</head>

<body>

<div class="left">
<select id="graphMode">
<option value="reaction">Reaction</option>
<option value="score">Score</option>
</select>
<canvas id="graph" height="200"></canvas>
<div id="best"></div>
<div id="elo"></div>
<div id="rank"></div>
</div>

<div class="center">
<div class="topbar">
<select id="mode">
<option value="classic">Classic</option>
<option value="rush">Rush</option>
<option value="wave">Wave</option>
</select>
<button id="start">Start</button>
</div>

<div id="game">
<div id="gameOver"></div>
</div>

<div id="pressureBar"><div id="pressure"></div></div>

<div style="margin-top:10px;text-align:center;font-size:14px;">
Click targets as fast as possible.<br>
Perfect timing gives more score.<br>
Miss = instant loss.<br>
Pressure increases difficulty.
</div>

</div>

<div class="right">
<h3>Leaderboard</h3>
<div id="panel"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCBCF3KYPBdBzEl4XFDmbkzdfZGIR58wRg",
  authDomain: "reactionarena-12fed.firebaseapp.com",
  databaseURL: "https://reactionarena-12fed-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "reactionarena-12fed"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* USER */
let player = localStorage.getItem("name");
if(!player){
  player = prompt("Enter your name:");
  localStorage.setItem("name", player);
}

/* STATE */
let running=false,mode="classic";
let score=0,elo=parseInt(localStorage.getItem("elo")||1000);
let bests=JSON.parse(localStorage.getItem("bests")||'{}');
let history=[],targets=[],ghost=[];

let pressure=0;

/* UI */
const game=document.getElementById("game");
const panel=document.getElementById("panel");
const pressureBar=document.getElementById("pressure");
const gameOverBox=document.getElementById("gameOver");

/* SOUND */
function play(freq){
let ctx=new AudioContext();
let o=ctx.createOscillator();
let g=ctx.createGain();
o.connect(g);g.connect(ctx.destination);
o.frequency.value=freq;
o.start();
g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.2);
}

/* START */
document.getElementById("start").onclick=()=>{
mode=document.getElementById("mode").value;
startGame();
};

function startGame(){
running=true;
score=0;
history=[];
ghost=[...history];
pressure=0;
clearTargets();
gameOverBox.style.display="none";

if(mode==="classic") classicLoop();
if(mode==="rush") rushLoop();
if(mode==="wave") waveLoop();
}

/* TARGET */
function spawn(){
let delay=200+Math.random()*600;

setTimeout(()=>{
if(!running) return;

let t=document.createElement("div");
t.className="target";
t.style.width="50px";
t.style.height="50px";
t.style.left=Math.random()*370+"px";
t.style.top=Math.random()*370+"px";

let start=performance.now();
let valid=false;

setTimeout(()=>valid=true,60); // anti-cheat

let timeout=setTimeout(()=>gameOver(),900-pressure*200);

t.onclick=(e)=>{
e.stopPropagation();
if(!valid) return;

let rt=performance.now()-start;
history.push(rt);

/* PERFECT SYSTEM */
let points=0;
if(rt<200){ points=300; play(800); pressure+=10; }
else if(rt<400){ points=150; play(500); pressure+=5; }
else{ points=50; play(200); pressure-=5; }

pressure=Math.max(0,Math.min(100,pressure));

score+=points*(1+pressure/100);

clearTimeout(timeout);
t.remove();

updateUI();
};

game.appendChild(t);
targets.push(t);

},delay);
}

/* LOOPS */
function classicLoop(){
let base=800;
function loop(){
if(!running) return;

spawn();
base+=Math.sin(score/500)*50; // rhythm shift
setTimeout(loop,base - pressure*3);
}
loop();
}

function rushLoop(){
let speed=400;
function loop(){
if(!running) return;

spawn();
speed*=0.98; // faster over time
setTimeout(loop,Math.max(120,speed - pressure*2));
}
loop();
}

function waveLoop(){
let wave=1;

function runWave(){
if(!running) return;

let needed=wave*2;
let done=0;

let timer=setTimeout(()=>{
if(done<needed) gameOver();
else{
wave++;
runWave();
}
},10000);

function spawnWave(){
if(done>=needed) return;
spawn();

let check=setInterval(()=>{
if(history.length>done){
done++;
clearInterval(check);
}
},10);
}

for(let i=0;i<needed;i++){
setTimeout(spawnWave,i*1000);
}
}
runWave();
}

/* GAME OVER */
function gameOver(){
running=false;
clearTargets();

gameOverBox.style.display="flex";
gameOverBox.innerHTML=`Game Over<br>Score: ${Math.floor(score)}`;

play(100);

/* ELO */
onValue(ref(db,"scores"),snap=>{
let data=snap.val()||{};
let avg = Object.values(data).reduce((a,b)=>a+b,0)/Object.values(data).length || 1000;

let expected=1/(1+Math.pow(10,(avg-elo)/400));
let actual=score>avg?1:0;

elo=Math.round(elo+32*(actual-expected));
localStorage.setItem("elo",elo);

updateUI();
},{onlyOnce:true});

/* SAVE BEST */
if(!bests[mode]||score>bests[mode]){
bests[mode]=score;
localStorage.setItem("bests",JSON.stringify(bests));
}

set(ref(db,"scores/"+player),elo);
}

/* CLEAN */
function clearTargets(){
targets.forEach(t=>t.remove());
targets=[];
}

/* UI */
function updateUI(){
document.getElementById("best").innerHTML=
`Best: ${bests.classic||0}/${bests.rush||0}/${bests.wave||0}`;

document.getElementById("elo").innerHTML=`ELO: ${elo}`;
document.getElementById("rank").innerHTML=`Rank: ${getRank(elo)}`;

pressureBar.style.width=pressure+"%";
drawGraph();
}

function getRank(e){
if(e<800)return"Iron";
if(e<1000)return"Bronze";
if(e<1200)return"Silver";
if(e<1400)return"Gold";
if(e<1600)return"Platinum";
if(e<1800)return"Diamond";
return"Master";
}

/* GRAPH */
function drawGraph(){
let ctx=graph.getContext("2d");
ctx.clearRect(0,0,graph.width,graph.height);

if(history.length<2) return;

let max=Math.max(...history);
let step=graph.width/history.length;

ctx.beginPath();
history.forEach((v,i)=>{
let x=i*step;
let y=graph.height-(v/max)*graph.height;
if(i===0)ctx.moveTo(x,y);
else ctx.lineTo(x,y);
});
ctx.strokeStyle="#00adb5";
ctx.stroke();
}

/* LEADERBOARD */
onValue(ref(db,"scores"),snap=>{
let data=snap.val()||{};
let arr=Object.entries(data).sort((a,b)=>b[1]-a[1]);

panel.innerHTML="";
arr.slice(0,10).forEach((p,i)=>{
panel.innerHTML+=`${i+1}. ${p[0]} - ${p[1]}<br>`;
});

let rank=arr.findIndex(p=>p[0]===player)+1;
panel.innerHTML+=`<hr>Your Rank: ${rank}`;
});

updateUI();
</script>

</body>
</html>
