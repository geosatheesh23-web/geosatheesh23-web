<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Arena</title>

<style>
body{margin:0;background:#0d0d0d;color:#fff;font-family:Arial;display:flex;height:100vh}
.left{width:25%;padding:10px}
.center{flex:1;display:flex;justify-content:center;align-items:center}
.right{width:25%;padding:10px;overflow:auto}

#game{
width:420px;height:420px;
background:#111;
border-radius:12px;
position:relative;
overflow:hidden;
}

.target{
position:absolute;
border-radius:50%;
background:#00adb5;
cursor:pointer;
transition:0.1s;
}

.boss{
background:#ff3b3b;
box-shadow:0 0 20px red;
}

button{
padding:8px;margin:5px;
background:#00adb5;
border:none;color:white;
border-radius:6px;cursor:pointer;
}

canvas{width:100%;background:#000;border-radius:8px}

.combo{
position:absolute;
color:#00ffcc;
font-size:18px;
animation:pop .3s ease;
}
@keyframes pop{from{transform:scale(.5)}to{transform:scale(1.5);opacity:0}}

.flash{
position:absolute;
top:0;left:0;right:0;bottom:0;
background:rgba(255,255,255,0.2);
animation:fade .3s;
}
@keyframes fade{to{opacity:0}}
</style>
</head>

<body>

<div class="left">
<canvas id="graph" height="200"></canvas>
<div id="stats"></div>
<div id="best"></div>
<div id="elo"></div>
<div id="rank"></div>
</div>

<div class="center">
<div id="game"></div>
</div>

<div class="right">
<h3>Leaderboard</h3>
<div id="panel"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "reactionarena-12fed.firebaseapp.com",
databaseURL: "https://reactionarena-12fed-default-rtdb.firebaseio.com",
projectId: "reactionarena-12fed"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* STATE */
let running=false;
let targets=[],history=[];
let score=0,combo=0;
let best=localStorage.getItem("best")||0;
let elo=parseInt(localStorage.getItem("elo")||1000);

let difficulty=1;
let waveCount=1;

let player="P"+Math.floor(Math.random()*100000);

/* UI */
const game=document.getElementById("game");
const stats=document.getElementById("stats");
const bestBox=document.getElementById("best");
const eloBox=document.getElementById("elo");
const rankBox=document.getElementById("rank");
const panel=document.getElementById("panel");
const graph=document.getElementById("graph");

/* RANK SYSTEM */
function getRank(e){
if(e<800) return "Iron";
if(e<1000) return "Bronze";
if(e<1200) return "Silver";
if(e<1400) return "Gold";
if(e<1600) return "Platinum";
if(e<1800) return "Diamond";
return "Master";
}

/* START */
function start(){
running=true;
score=0;combo=0;history=[];
targets.forEach(t=>cleanupTarget(t));
targets=[];
game.innerHTML="";
waveCount=1;
difficulty=1;
nextWave();
}

game.onclick=(e)=>{
if(e.target===game && running) gameOver();
};

/* WAVE */
function nextWave(){
if(!running) return;

let count=Math.floor(waveCount*2 + difficulty*3);
let cleared=0;
let isBoss = waveCount%5===0;

let interval=setInterval(()=>{
spawnTarget(isBoss);
},Math.max(200,1000/difficulty));

setTimeout(()=>{
clearInterval(interval);
if(cleared<count) gameOver();
else{
waveCount++;
nextWave();
}
},8000);

function spawnTarget(boss){
let t=document.createElement("div");
let size=boss?80:50;

t.className="target";
if(boss) t.classList.add("boss");

t.style.width=size+"px";
t.style.height=size+"px";
t.style.left=Math.random()*360+"px";
t.style.top=Math.random()*360+"px";

let start=performance.now();
let hp = boss ? 3 : 1;

/* MOVEMENT */
let dx = (Math.random()-0.5)*4*difficulty;
let dy = (Math.random()-0.5)*4*difficulty;

let move=setInterval(()=>{
let x=parseFloat(t.style.left);
let y=parseFloat(t.style.top);

x+=dx; y+=dy;

if(x<0||x>360) dx*=-1;
if(y<0||y>360) dy*=-1;

t.style.left=x+"px";
t.style.top=y+"px";
},16);

/* LIFE TIMER */
let timeout=setTimeout(()=>{
cleanupTarget(t);
gameOver();
},boss?2500:1500);

t.onclick=(e)=>{
e.stopPropagation();

hp--;
if(hp>0){
t.style.transform="scale(1.2)";
setTimeout(()=>t.style.transform="scale(1)",100);
return;
}

clearInterval(move);
clearTimeout(timeout);

/* TIME */
let time=performance.now()-start;
history.push(time);

/* SMOOTH DIFFICULTY */
let avg=history.reduce((a,b)=>a+b,0)/history.length;
let targetDiff = avg<250?3:avg<400?2.5:avg<600?2:1.5;
difficulty += (targetDiff - difficulty)*0.1;

difficulty=Math.max(0.5,Math.min(3,difficulty));

score+=10+combo;
combo++;
cleared++;

showCombo(t);
cleanupTarget(t);
update();
updateDB();
};

targets.push(t);
game.appendChild(t);

t.dataset.move=move;
t.dataset.timeout=timeout;
}

}

/* CLEANUP */
function cleanupTarget(t){
clearInterval(t.dataset.move);
clearTimeout(t.dataset.timeout);
t.remove();
}

/* COMBO */
function showCombo(t){
let c=document.createElement("div");
c.className="combo";
c.innerText="x"+combo;
c.style.left=t.style.left;
c.style.top=t.style.top;
game.appendChild(c);
setTimeout(()=>c.remove(),300);
}

/* GAME OVER */
function gameOver(){
running=false;
targets.forEach(t=>cleanupTarget(t));
targets=[];

/* REAL ELO */
let expected = 1/(1+Math.pow(10,(1000-elo)/400));
let actual = score>best?1:0;

elo = Math.round(elo + 32*(actual-expected));
elo=Math.max(0,elo);
localStorage.setItem("elo",elo);

if(score>best){
best=score;
localStorage.setItem("best",best);
flash();
}

update();
}

/* FLASH */
function flash(){
let f=document.createElement("div");
f.className="flash";
game.appendChild(f);
setTimeout(()=>f.remove(),300);
}

/* UPDATE */
function update(){
stats.innerHTML=`Score: ${score}<br>Combo: ${combo}<br>Wave: ${waveCount}`;
bestBox.innerHTML=`Best: ${best}`;
eloBox.innerHTML=`ELO: ${elo}`;
rankBox.innerHTML=`Rank: ${getRank(elo)}`;
drawGraph();
}

/* GRAPH */
function drawGraph(){
let ctx=graph.getContext("2d");
ctx.clearRect(0,0,graph.width,graph.height);

if(history.length<2)return;

let max=Math.max(...history);
let step=graph.width/history.length;

ctx.beginPath();
history.forEach((v,i)=>{
let x=i*step;
let y=graph.height-(v/max)*graph.height;
if(i===0)ctx.moveTo(x,y);
else ctx.lineTo(x,y);
});
ctx.strokeStyle="#00adb5";
ctx.stroke();
}

/* LEADERBOARD */
function updateDB(){
set(ref(db,"scores/"+player),score);
}

onValue(ref(db,"scores"),snap=>{
let data=snap.val()||{};
let arr=Object.entries(data).sort((a,b)=>b[1]-a[1]);

panel.innerHTML="";
arr.slice(0,10).forEach((p,i)=>{
panel.innerHTML+=`${i+1}. ${p[0]} - ${p[1]}<br>`;
});

let rank=arr.findIndex(p=>p[0]===player)+1;
panel.innerHTML+=`<hr>Your Rank: ${rank}`;
});

/* START BUTTON */
let btn=document.createElement("button");
btn.innerText="Start Game";
btn.onclick=start;
document.body.appendChild(btn);

update();
</script>

</body>
</html>
