<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Arena</title>

<style>
body{margin:0;background:#0d0d0d;color:#fff;font-family:Arial;display:flex;height:100vh}

/* LAYOUT */
.left{width:25%;padding:10px}
.center{flex:1;display:flex;flex-direction:column;align-items:center}
.right{width:25%;padding:10px;overflow:auto}

.topbar{margin-bottom:10px}

#game{
width:420px;height:420px;
background:#111;border-radius:12px;
position:relative;overflow:hidden;
}

.target{
position:absolute;border-radius:50%;
background:#00adb5;cursor:pointer;
}

.boss{background:red;box-shadow:0 0 20px red;}

button,select{
padding:8px;margin:5px;background:#00adb5;
border:none;color:white;border-radius:6px;cursor:pointer;
}

canvas{width:100%;background:#000;border-radius:8px}
</style>
</head>

<body>

<div class="left">
<select id="graphMode">
<option value="reaction">Reaction Time</option>
<option value="score">Score</option>
</select>
<canvas id="graph" height="200"></canvas>

<div id="best"></div>
<div id="elo"></div>
<div id="rank"></div>
</div>

<div class="center">
<div class="topbar">
<select id="mode">
<option value="classic">Classic</option>
<option value="rush">Rush</option>
<option value="wave">Wave</option>
</select>
<button id="start">Start</button>
</div>

<div id="game"></div>
</div>

<div class="right">
<h3>Leaderboard</h3>
<div id="panel"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

/* 🔑 PUT YOUR REAL CONFIG HERE */
const firebaseConfig = {
  apiKey: "AIzaSyCBCF3KYPBdBzEl4XFDmbkzdfZGIR58wRg",
  authDomain: "reactionarena-12fed.firebaseapp.com",
  databaseURL: "https://reactionarena-12fed-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "reactionarena-12fed"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* USER */
let player = localStorage.getItem("name");
if(!player){
  player = prompt("Enter your name:");
  localStorage.setItem("name", player);
}

/* STATE */
let running=false,mode="classic";
let score=0,elo=parseInt(localStorage.getItem("elo")||1000);
let bests=JSON.parse(localStorage.getItem("bests")||'{}');

let history=[],targets=[];

/* UI */
const game=document.getElementById("game");
const graph=document.getElementById("graph");
const panel=document.getElementById("panel");

/* RANK */
function getRank(e){
if(e<800) return "Iron";
if(e<1000) return "Bronze";
if(e<1200) return "Silver";
if(e<1400) return "Gold";
if(e<1600) return "Platinum";
if(e<1800) return "Diamond";
return "Master";
}

/* START */
document.getElementById("start").onclick=()=>{
mode=document.getElementById("mode").value;
startGame();
};

function startGame(){
running=true;
score=0;
history=[];
clearTargets();

if(mode==="classic") classicLoop();
if(mode==="rush") rushLoop();
if(mode==="wave") waveLoop();
}

/* GAME OVER */
function gameOver(){
running=false;
clearTargets();

/* ELO vs leaderboard */
onValue(ref(db,"scores"),snap=>{
let data=snap.val()||{};
let players=Object.values(data);

let avg = players.length ? players.reduce((a,b)=>a+b,0)/players.length : 1000;
let expected = 1/(1+Math.pow(10,(avg-elo)/400));
let actual = score>avg?1:0;

elo = Math.round(elo + 32*(actual-expected));
localStorage.setItem("elo",elo);

updateUI();
},{onlyOnce:true});

/* BEST */
if(!bests[mode] || score>bests[mode]){
bests[mode]=score;
localStorage.setItem("bests",JSON.stringify(bests));
}

updateDB();
}

/* TARGET */
function spawn(moving=false,boss=false){
let t=document.createElement("div");
let size=boss?70:40;

t.className="target";
if(boss) t.classList.add("boss");

t.style.width=size+"px";
t.style.height=size+"px";
t.style.left=Math.random()*380+"px";
t.style.top=Math.random()*380+"px";

let start=performance.now();

let dx=(Math.random()-0.5)*6;
let dy=(Math.random()-0.5)*6;

let move;
if(moving){
move=setInterval(()=>{
let x=parseFloat(t.style.left)+dx;
let y=parseFloat(t.style.top)+dy;
if(x<0||x>380) dx*=-1;
if(y<0||y>380) dy*=-1;
t.style.left=x+"px";
t.style.top=y+"px";
},16);
}

let timeout=setTimeout(()=>gameOver(),boss?1200:800);

t.onclick=(e)=>{
e.stopPropagation();

let rt=performance.now()-start;
history.push(rt);

score+=Math.max(0,500-rt);

clearInterval(move);
clearTimeout(timeout);
t.remove();

updateUI();
};

game.appendChild(t);
targets.push({el:t,move,timeout});
}

/* LOOPS */
function classicLoop(){
function loop(){
if(!running) return;
spawn(false,false);
setTimeout(loop,800);
}
loop();
}

function rushLoop(){
function loop(){
if(!running) return;
spawn(true,false);
setTimeout(loop,300);
}
loop();
}

function waveLoop(){
let wave=1;

function loop(){
if(!running) return;

for(let i=0;i<wave;i++){
spawn(true,wave%5===0);
}

wave++;
setTimeout(loop,1200);
}
loop();
}

/* CLEAN */
function clearTargets(){
targets.forEach(t=>{
clearInterval(t.move);
clearTimeout(t.timeout);
t.el.remove();
});
targets=[];
}

/* UI */
function updateUI(){
document.getElementById("best").innerHTML=
`Best (C/R/W): ${bests.classic||0} / ${bests.rush||0} / ${bests.wave||0}`;

document.getElementById("elo").innerHTML=`ELO: ${elo}`;
document.getElementById("rank").innerHTML=`Rank: ${getRank(elo)}`;

drawGraph();
}

/* GRAPH */
function drawGraph(){
let ctx=graph.getContext("2d");
ctx.clearRect(0,0,graph.width,graph.height);

if(history.length<2) return;

let mode=document.getElementById("graphMode").value;

let max=Math.max(...history);
let step=graph.width/history.length;

ctx.beginPath();
history.forEach((v,i)=>{
let val = mode==="reaction"?v:(i+1)*50;
let x=i*step;
let y=graph.height-(val/max)*graph.height;

if(i===0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);
});

ctx.strokeStyle="#00adb5";
ctx.stroke();
}

/* DB */
function updateDB(){
set(ref(db,"scores/"+player),elo);
}

onValue(ref(db,"scores"),snap=>{
let data=snap.val()||{};
let arr=Object.entries(data).sort((a,b)=>b[1]-a[1]);

panel.innerHTML="";
arr.slice(0,10).forEach((p,i)=>{
panel.innerHTML+=`${i+1}. ${p[0]} - ${p[1]}<br>`;
});

let rank=arr.findIndex(p=>p[0]===player)+1;
panel.innerHTML+=`<hr>Your Rank: ${rank}`;
});

updateUI();
</script>

</body>
</html>
